<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Bienvenue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --green: #2ecc71; --red: #e74c3c; }
        body { background-color: var(--navy); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .auth-box { 
            background: var(--card-dark); padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 400px; border: 1px solid rgba(212, 175, 55, 0.3); 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-area { margin-bottom: 20px; }
        .logo-area i { font-size: 50px; color: var(--gold); }
        h2 { color: var(--gold); margin-bottom: 10px; font-weight: 800; }

        input { 
            width: 100%; padding: 12px; margin-top: 12px; 
            background: rgba(10, 25, 47, 0.8); border: 1px solid var(--gold); 
            color: white; border-radius: 8px; box-sizing: border-box; outline: none;
            font-size: 15px;
        }

        .btn-action { 
            background: var(--gold); color: black; border: none; 
            padding: 15px; width: 100%; border-radius: 10px; 
            font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; 
            transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.02); opacity: 0.9; }

        .toggle-link { font-size: 13px; margin-top: 15px; cursor: pointer; color: var(--gold); opacity: 0.8; }
        .hidden { display: none; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .alert-msg { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 13px; display: none; }
        .alert-msg.success { background: rgba(46, 204, 113, 0.2); color: var(--green); border: 1px solid var(--green); }
        .alert-msg.error { background: rgba(231, 76, 60, 0.2); color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>

    <div class="auth-box">
        <div class="logo-area">
            <i class="fas fa-robot"></i>
            <h2>LIVE CRYPTO BOT</h2>
        </div>

        <div id="alertBox" class="alert-msg"></div>

        <div id="login-section">
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Modpas">
            <button class="btn-action" id="btnLogin">KONEKTE</button>
            <p class="toggle-link" id="toRegister">Ou pa gen kont? Kreye youn la</p>
        </div>

        <div id="register-section" class="hidden">
            <div class="grid-2">
                <input type="text" id="reg-nom" placeholder="Non">
                <input type="text" id="reg-prenom" placeholder="Prenon">
            </div>
            <input type="tel" id="reg-tel" placeholder="Telefòn (Eg: +50931000000)">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Modpas">
            <input type="password" id="reg-confirm" placeholder="Konfime Modpas">
            <button class="btn-action" id="btnRegister">ENSKRI</button>
            <p class="toggle-link" id="toLogin">Ou gen kont deja? Konekte</p>
        </div>

        <div id="verify-section" class="hidden">
            <i class="fas fa-envelope-open-text" style="font-size: 40px; color: var(--gold); margin-bottom: 15px;"></i>
            <p style="font-size: 14px; opacity: 0.9; line-height: 1.5;">
                Nou voye yon lyen konfimasyon sou imel ou! <br>
                Apre ou fin klike sou lyen an nan bwat imel ou, klike sou bouton anba a pou w antre.
            </p>
            <button class="btn-action" id="btnCheckVerify" style="background: var(--green); color: white;">MWEN FIN VERIFYE IMEL MWEN</button>
            <p class="toggle-link" id="toLoginFromVerify">Tounen nan paj Konekte</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Konfigirasyon pwojè w la
        const firebaseConfig = {
            apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE",
            authDomain: "live-crypto-bot.firebaseapp.com",
            projectId: "live-crypto-bot",
            databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com",
            appId: "1:583419008753:web:f4b8389ace26d7e5bf7b50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Jesyon Toggle ant fòmilè yo
        document.getElementById('toRegister').addEventListener('click', () => toggleAuth('register'));
        document.getElementById('toLogin').addEventListener('click', () => toggleAuth('login'));
        document.getElementById('toLoginFromVerify').addEventListener('click', () => toggleAuth('login'));

        function toggleAuth(type) {
            hideAlert();
            if(type === 'register') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('verify-section').classList.add('hidden');
                document.getElementById('register-section').classList.remove('hidden');
            } else if(type === 'verify') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('verify-section').classList.remove('hidden');
            } else {
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('verify-section').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.innerText = msg;
            box.className = "alert-msg " + type;
            box.style.display = "block";
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = "none";
        }

        // 📝 LOJIK ENSKRIPSYON (REGISTER)
        document.getElementById('btnRegister').addEventListener('click', async () => {
            const nom = document.getElementById('reg-nom').value.trim();
            const prenom = document.getElementById('reg-prenom').value.trim();
            const tel = document.getElementById('reg-tel').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            if(!nom || !prenom || !tel || !email || !pass) {
                showAlert("⚠️ Tanpri ranpli tout bwat yo!", "error");
                return;
            }

            if(pass !== confirm) {
                showAlert("❌ Modpas yo pa koresponn!", "error");
                return;
            }

            showAlert("Kreyasyon kont lan ap fèt... ⏳", "success");

            try {
                // 1. Kreye itilizatè a nan Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // Jenere yon bèl ti ID fòma (Eg: LC-8547)
                const randomID = "LC-" + Math.floor(1000 + Math.random() * 9000);

                // 2. Sove enfòmasyon yo nan Realtime Database
                await set(ref(db, 'users/' + randomID), {
                    uid: user.uid,
                    nom: nom,
                    prenom: prenom,
                    telefon: tel,
                    email: email,
                    kycVerified: false,
                    kycStatus: "non_soumis",
                    balance: 0.00
                });

                // 3. Sove ID a nan sesyon tanporè
                localStorage.setItem('userID', randomID);

                // 4. Voye lyen verifikasyon an nan imel li
                await sendEmailVerification(user);

                showAlert("Kont kreye! Al verifye imel ou kounye a. ✉️", "success");
                toggleAuth('verify');

            } catch (error) {
                let errorMsg = "Erè pandan enskripsyon an.";
                if(error.code === 'auth/email-already-in-use') errorMsg = "❌ Imel sa a gen yon kont deja.";
                if(error.code === 'auth/weak-password') errorMsg = "❌ Modpas la dwe gen omwen 6 karaktè.";
                showAlert(errorMsg, "error");
            }
        });

        // ✉️ TCHEKE SI LI FIN KLIKE SOU LYEN VERIFIKASYON AN
        document.getElementById('btnCheckVerify').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (user) {
                // Fòse Firebase reload kont lan pou l tcheke si li verifye vre
                await user.reload();
                if (user.emailVerified) {
                    showAlert("Bravo! Imel ou verifye ak siksè. 🎉", "success");
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                } else {
                    showAlert("❌ Ou pa t klike sou lyen an nan imel ou an kòtou. Tcheke bwat Spam tou!", "error");
                }
            } else {
                showAlert("Koneksyon an pèdi. Tanpri tounen nan paj Login pou w konekte.", "error");
            }
        });

        // 🔑 LOJIK KONEKSYON (LOGIN)
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;

            if(!email || !pass) {
                showAlert("⚠️ Ranpli tou de bwat yo!", "error");
                return;
            }

            showAlert("Koneksyon ap fèt... ⏳", "success");

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // Si imel li pa verifye, nou bloke l pou l al verifye l anvan
                if(!user.emailVerified) {
                    await sendEmailVerification(user); // n ap voye l ankò pou si l te pèdi l
                    showAlert("✉️ Imel ou pa t verifye. Nou voye yon lòt lyen ba ou kounye a!", "error");
                    toggleAuth('verify');
                    return;
                }

                // Si l verifye, nou sove imel la epi voye l sou dashboard la dirèkteman
                localStorage.setItem('userEmail', user.email);
                window.location.href = "dashboard.html";

            } catch (error) {
                let errorMsg = "❌ Imel oswa Modpas la pa bon.";
                if(error.code === 'auth/user-not-found') errorMsg = "❌ Itilizatè sa a pa egziste.";
                showAlert(errorMsg, "error");
            }
        });
    </script>
</body>
</html>
