<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Bienvenue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --green: #2ecc71; --red: #e74c3c; }
        
        body { 
            background-color: var(--navy); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 15px;
            box-sizing: border-box;
        }

        .auth-box { 
            background: var(--card-dark); 
            padding: 30px 25px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 400px; 
            min-height: 520px; /* 🔒 Kenbe wotè fiks pou paj la pa danse */
            border: 1px solid rgba(212, 175, 55, 0.3); 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .logo-area { margin-bottom: 15px; }
        .logo-area i { font-size: 45px; color: var(--gold); }
        h2 { color: var(--gold); margin: 8px 0; font-weight: 800; font-size: 22px; letter-spacing: 1px; }

        /* 🔔 Zòn Alèt ki gen yon wotè fiks pou l pa janm deplase rès kòd la */
        .alert-container {
            min-height: 45px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .alert-msg { 
            width: 100%;
            padding: 10px; 
            border-radius: 8px; 
            font-size: 13px; 
            display: none; 
            box-sizing: border-box;
        }
        .alert-msg.success { background: rgba(46, 204, 113, 0.15); color: var(--green); border: 1px solid var(--green); }
        .alert-msg.error { background: rgba(231, 76, 60, 0.15); color: var(--red); border: 1px solid var(--red); }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 12px; 
            background: rgba(10, 25, 47, 0.8); 
            border: 1px solid var(--gold); 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: white; box-shadow: 0 0 5px rgba(255,255,255,0.2); }

        .btn-action { 
            background: var(--gold); 
            color: black; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 20px; 
            transition: 0.2s;
        }
        .btn-action:hover { transform: scale(1.01); opacity: 0.9; }

        .toggle-link { font-size: 13px; margin-top: 18px; cursor: pointer; color: var(--gold); opacity: 0.8; transition: 0.2s; }
        .toggle-link:hover { opacity: 1; text-decoration: underline; }
        
        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div class="auth-box">
        <div class="logo-area">
            <i class="fas fa-robot"></i>
            <h2>LIVE CRYPTO BOT</h2>
        </div>

        <div class="alert-container">
            <div id="alertBox" class="alert-msg"></div>
        </div>

        <div id="login-section">
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Modpas">
            <button class="btn-action" id="btnLogin">KONEKTE</button>
            <p class="toggle-link" id="toRegister">Ou pa gen kont? Kreye youn la</p>
        </div>

        <div id="register-section" class="hidden">
            <div class="grid-2">
                <input type="text" id="reg-nom" placeholder="Non">
                <input type="text" id="reg-prenom" placeholder="Prenon">
            </div>
            <input type="tel" id="reg-tel" placeholder="Telefòn (Eg: +50931000000)">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Modpas">
            <input type="password" id="reg-confirm" placeholder="Konfime Modpas">
            <button class="btn-action" id="btnRegister">ENSKRI</button>
            <p class="toggle-link" id="toLogin">Ou gen kont deja? Konekte</p>
        </div>

        <div id="verify-section" class="hidden">
            <i class="fas fa-envelope-open-text" style="font-size: 40px; color: var(--gold); margin-bottom: 15px; margin-top: 10px;"></i>
            <p style="font-size: 14px; opacity: 0.9; line-height: 1.5; margin: 0 0 15px 0;">
                Nou voye yon lyen konfimasyon sou imel ou! <br>
                Apre ou fin klike sou lyen an, klike sou bouton anba a.
            </p>
            <button class="btn-action" id="btnCheckVerify" style="background: var(--green); color: white; margin-top: 5px;">MWEN FIN VERIFYE IMEL MWEN</button>
            <p class="toggle-link" id="toLoginFromVerify">Tounen nan paj Konekte</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE",
            authDomain: "live-crypto-bot.firebaseapp.com",
            projectId: "live-crypto-bot",
            databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com",
            appId: "1:583419008753:web:f4b8389ace26d7e5bf7b50"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        document.getElementById('toRegister').addEventListener('click', () => toggleAuth('register'));
        document.getElementById('toLogin').addEventListener('click', () => toggleAuth('login'));
        document.getElementById('toLoginFromVerify').addEventListener('click', () => toggleAuth('login'));

        function toggleAuth(type) {
            hideAlert();
            if(type === 'register') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('verify-section').classList.add('hidden');
                document.getElementById('register-section').classList.remove('hidden');
            } else if(type === 'verify') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('verify-section').classList.remove('hidden');
            } else {
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('verify-section').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.innerText = msg;
            box.className = "alert-msg " + type;
            box.style.display = "block";
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = "none";
        }

        // 📝 ENSKRIPSYON
        document.getElementById('btnRegister').addEventListener('click', async () => {
            const nom = document.getElementById('reg-nom').value.trim();
            const prenom = document.getElementById('reg-prenom').value.trim();
            const tel = document.getElementById('reg-tel').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            if(!nom || !prenom || !tel || !email || !pass) {
                showAlert("⚠️ Tanpri ranpli tout bwat yo!", "error");
                return;
            }
            if(pass !== confirm) {
                showAlert("❌ Modpas yo pa koresponn!", "error");
                return;
            }

            showAlert("Kreyasyon kont lan ap fèt... ⏳", "success");

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                const randomID = "LC-" + Math.floor(1000 + Math.random() * 9000);

                await set(ref(db, 'users/' + randomID), {
                    uid: user.uid,
                    nom: nom,
                    prenom: prenom,
                    telefon: tel,
                    email: email,
                    kycVerified: false,
                    kycStatus: "non_soumis",
                    balance: 0.00
                });

                localStorage.setItem('userID', randomID);
                await sendEmailVerification(user);

                showAlert("Kont kreye! Al verifye imel ou. ✉️", "success");
                toggleAuth('verify');

            } catch (error) {
                let errorMsg = "Erè pandan enskripsyon an.";
                if(error.code === 'auth/email-already-in-use') errorMsg = "❌ Imel sa a gen yon kont deja.";
                if(error.code === 'auth/weak-password') errorMsg = "❌ Modpas la dwe omwen 6 karaktè.";
                showAlert(errorMsg, "error");
            }
        });

        // ✉️ VERIFIKASYON IMEL
        document.getElementById('btnCheckVerify').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (user) {
                await user.reload();
                if (user.emailVerified) {
                    showAlert("Bravo! Imel ou verifye. 🎉", "success");
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                } else {
                    showAlert("❌ Ou poko klike sou lyen nan imel la.", "error");
                }
            } else {
                showAlert("Koneksyon pèdi. Refè login lan.", "error");
            }
        });

        // 🔑 KONEKSYON
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;

            if(!email || !pass) {
                showAlert("⚠️ Ranpli tou de bwat yo!", "error");
                return;
            }

            showAlert("Koneksyon ap fèt... ⏳", "success");

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                if(!user.emailVerified) {
                    await sendEmailVerification(user);
                    showAlert("✉️ Imel ou pa t verifye. Nou voye yon lòt lyen ba ou!", "error");
                    toggleAuth('verify');
                    return;
                }

                localStorage.setItem('userEmail', user.email);
                window.location.href = "dashboard.html";

            } catch (error) {
                showAlert("❌ Imel oswa Modpas la pa bon.", "error");
            }
        });
    </script>
</body>
</html>
