<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recharger - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a192f; --card: #112240; --gold: #d4af37; --blue: #0063e5; --text: #ccd6f6; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; position: relative; }
        .container { width: 100%; max-width: 450px; margin-top: 10px; }
        h2 { color: var(--gold); text-align: center; text-transform: uppercase; margin-bottom: 5px; font-size: 20px; }
        .sub-title { text-align: center; font-size: 11px; opacity: 0.6; margin-bottom: 25px; text-transform: uppercase; color: var(--text); }
        
        .back-btn { position: absolute; top: 20px; left: 20px; color: var(--gold); text-decoration: none; font-size: 20px; }

        .methods { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .method-card { 
            background: var(--card); padding: 15px 5px; border-radius: 12px; text-align: center; 
            border: 1px solid var(--blue); background: rgba(0, 99, 229, 0.1);
        }
        .method-card i { display: block; font-size: 24px; margin-bottom: 8px; color: var(--gold); }

        .recharge-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--gold); margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .field { position: relative; }
        .field i { position: absolute; left: 15px; top: 13px; color: var(--blue); }
        .field input { 
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 12px 12px 45px; border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-size: 14px;
        }

        .loader {
            display: none; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold);
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .summary { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .sum-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }
        .total-row { border-top: 1px solid rgba(255,255,255,0.1); font-weight: bold; color: #2ecc71; font-size: 16px; margin-top: 10px; padding-top: 10px;}

        .btn-pay { 
            width: 100%; padding: 15px; background: var(--blue); color: white; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; text-transform: uppercase; font-size: 14px;
        }
        .btn-pay:disabled { background: #333; cursor: not-allowed; opacity: 0.7; }

        #status { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 25px; border-radius: 10px; display: none; z-index: 9999;
            font-weight: bold; text-align: center; min-width: 280px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-size: 13px;
        }
        .success-alert { background: #2ecc71; color: white; border: 1px solid #27ae60; }
        .error-alert { background: #e74c3c; color: white; border: 1px solid #c0392b; }
    </style>
</head>
<body>

<div id="status"></div>

<div class="container">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    
    <h2>RECHARGER SÈVIS</h2>
    <div class="sub-title">Live Crypto Bot System</div>

    <div class="methods">
        <div class="method-card">
            <i class="fas fa-wallet"></i><span>MeRU Sèvis</span>
        </div>
    </div>

    <div class="recharge-card">
        <div class="input-group">
            <label>Email compte MeRU (Source)</label>
            <div class="field">
                <i class="fas fa-wallet"></i>
                <input type="text" id="email-source" placeholder="votre@email-meru.com">
            </div>
        </div>

        <div class="input-group">
            <label>Email compte MeRU (Destinataire)</label>
            <div class="field">
                <i class="fas fa-sign-in-alt" style="color: #2ecc71;"></i>
                <input type="text" id="email-dest" placeholder="Compte MeRU à recharger">
            </div>
        </div>

        <div class="input-group">
            <label>Montant total à envoyer ($)</label>
            <div class="field">
                <i class="fas fa-dollar-sign"></i>
                <input type="number" id="amount" placeholder="0.00">
            </div>
        </div>

        <div class="summary">
            <div class="sum-row"><span>Méthode:</span> <span id="view-method">MERU</span></div>
            <div class="sum-row"><span>Frais de service (5%):</span> <span id="view-frais">$0.00</span></div>
            <div class="total-row"><span>Net à recevoir:</span> <span id="view-total">$0.00</span></div>
        </div>

        <div id="loader" class="loader"></div>
        <button class="btn-pay" id="btn-submit">Confirmer la recharge</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE",
        authDomain: "live-crypto-bot.firebaseapp.com",
        projectId: "live-crypto-bot",
        databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com",
        appId: "1:583419008753:web:f4b8389ace26d7e5bf7b50"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const userID = localStorage.getItem('userID') || sessionStorage.getItem('userID') || "BK-2026";
    const username = localStorage.getItem('username') || "Kliyan VIP";

    // 🧮 Sistèm pou kalkile frè yo an pousantaj (5% men pa mwens pase $1.00)
    window.calculer = function() {
        let val = parseFloat(document.getElementById('amount').value);
        let viewFrais = document.getElementById('view-frais');
        let viewTotal = document.getElementById('view-total');
        
        if (isNaN(val) || val <= 0) {
            viewFrais.innerText = "$0.00";
            viewTotal.innerText = "$0.00";
            return;
        }

        // Kalkil 5% an pousantaj
        let kalkilFrais = val * 0.05;
        // Si 5% lan pi piti pase $1.00, li fòse frè a rete $1.00 pou w pa pèdi
        let fraisFinal = kalkilFrais < 1.00 ? 1.00 : kalkilFrais;

        let aResevwa = val - fraisFinal;

        viewFrais.innerText = "$" + fraisFinal.toFixed(2);
        viewTotal.innerText = "$" + (aResevwa < 0 ? "0.00" : aResevwa.toFixed(2));
    }

    window.finaliser = async function() {
        const source = document.getElementById('email-source').value;
        const dest = document.getElementById('email-dest').value;
        const amt = parseFloat(document.getElementById('amount').value);
        const btn = document.getElementById('btn-submit');
        const loader = document.getElementById('loader');

        if(!source || !dest || isNaN(amt) || amt <= 0) {
            window.showMsg("Veuillez remplir tous les champs ⚠️", "error-alert");
            return;
        }

        let kalkilFrais = amt * 0.05;
        let fraisFinal = kalkilFrais < 1.00 ? 1.00 : kalkilFrais;
        let aResevwa = amt - fraisFinal;

        if(aResevwa <= 0) {
            window.showMsg("Montant insuffisant pour couvrir les frais ❌", "error-alert");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Traitement...";
        loader.style.display = "block";

        const dateJodiya = new Date().toLocaleString('fr-FR', { timeZone: 'UTC' });

        const trData = {
            amount: `${amt.toFixed(2)} $`,
            date: dateJodiya,
            method: "(MERU)",
            status: "En attente",
            type: "Dépôt"
        };

        try {
            // Sove nan Firebase pou istorik kliyan an
            await push(ref(db, 'users/' + userID + '/transactions'), trData);

            // Gwo mesaj pou voye bay Admin sou Telegram ak kalkil nèt la
            const msg = `📥 *DEMANDE DE RECHARGE SÈVIS - LIVE CRYPTO BOT*\n\n` +
                        `👤 *Kliyan:* ${username}\n` +
                        `🆔 *ID Kont:* \`${userID}\`\n\n` +
                        `⚙️ *Sèvis:* MeRU\n` +
                        `📤 *Kont Moun nan Peye (Source):* \`${source}\`\n` +
                        `📩 *Kont pou w Recharje a (Destinataire):* \`${dest}\`\n\n` +
                        `💰 *Montan li Voye:* ${amt.toFixed(2)} $\n` +
                        `📉 *Frè Sèvis (5%):* ${fraisFinal.toFixed(2)} $\n` +
                        `💵 *Net pou w voye ba li:* ${aResevwa.toFixed(2)} $\n\n` +
                        `⚙️ *Estati:* En attente (Mande recharche)`;

            const res = await fetch(`https://api.telegram.org/bot8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: "8118891270", text: msg, parse_mode: 'Markdown' })
            });

            if(res.ok) {
                window.showMsg("Demande envoyée avec succès! ✅", "success-alert");
                document.getElementById('email-source').value = "";
                document.getElementById('email-dest').value = "";
                document.getElementById('amount').value = "";
                window.calculer();
            } else {
                throw new Error();
            }
        } catch (e) {
            window.showMsg("Erreur de connexion ❌", "error-alert");
        } finally {
            btn.disabled = false;
            btn.innerText = "Confirmer la recharge";
            loader.style.display = "none";
        }
    }

    window.showMsg = function(txt, cls) {
        const status = document.getElementById('status');
        status.innerText = txt;
        status.className = cls;
        status.style.display = "block";
        setTimeout(() => { status.style.display = "none"; }, 4000);
    }

    document.getElementById('amount').addEventListener('input', window.calculer);
    document.getElementById('btn-submit').addEventListener('click', window.finaliser);
</script>

</body>
</html>
