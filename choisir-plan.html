<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demann Kat Vityèl</title>
    <style>
        :root { --gold: #d4af37; --navy: #060e1b; }
        body { background: var(--navy); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; background: #112240; border: 1px solid rgba(212,175,55,0.3); padding: 12px; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-action { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Demann Kat Vityèl</h3>

    <div class="input-group">
        <label>Non</label>
        <input type="text" id="firstName" placeholder="Non ou">
    </div>

    <div class="input-group">
        <label>Prenon</label>
        <input type="text" id="lastName" placeholder="Prenon ou">
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@gmail.com">
    </div>

    <div class="input-group">
        <label>Nimewo Telefòn</label>
        <input type="tel" id="phone" placeholder="+509 XXXXXXXX">
    </div>

    <div class="input-group">
        <label>Kalite Kat (Chwazi selon bezwen ou)</label>
        <select id="cardType" onchange="updatePrice()">
            <option value="STANDARD">STANDARD (15$) - Acha baz (SHEIN, Alibaba)</option>
            <option value="GOLD">GOLD (19$) - Pi gwo limit pou acha entènèt</option>
            <option value="VIP">VIP (20$) - San limit, pafè pou Ads</option>
        </select>
    </div>

    <div class="input-group">
        <label>Montan Finansman ($)</label>
        <input type="number" id="amount" value="15" readonly style="background:#0a1930; color:#d4af37; font-weight:bold;">
    </div>

    <button class="btn-action" onclick="finalizeAll()">FINALIZA PEYEMAN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));
    const botToken = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc";
    const chatID = -1003948852501;

    // Fonksyon pou chanje pri otomatikman
    window.updatePrice = function() {
        const type = document.getElementById('cardType').value;
        const amountInput = document.getElementById('amount');
        if(type === 'STANDARD') amountInput.value = 15;
        else if(type === 'GOLD') amountInput.value = 19;
        else if(type === 'VIP') amountInput.value = 20;
    }

    window.finalizeAll = async function() {
        const fName = document.getElementById('firstName').value;
        const lName = document.getElementById('lastName').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const plan = document.getElementById('cardType').value;
        const amount = document.getElementById('amount').value;

        if(!fName || !email || !phone) return alert("Tanpri ranpli tout enfòmasyon yo!");

        const orderId = Date.now();
        const data = {
            nom: fName + " " + lName,
            email: email,
            phone: phone,
            plan: plan,
            montan: amount,
            status: "An atant"
        };

        await set(ref(db, 'demandes_cartes/' + orderId), data);

        const text = `💳 *NOUVO LÒD KAT*\n` +
                     `🆔 *ID:* ${orderId}\n` +
                     `👤 *Kliyan:* ${data.nom}\n` +
                     `📞 *Tel:* ${phone}\n` +
                     `📧 *Imel:* ${email}\n` +
                     `💰 *Montan:* ${amount} USDT\n` +
                     `💳 *Kalite:* ${plan}`;
        
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                chat_id: chatID, 
                text: text, 
                parse_mode: 'Markdown',
                reply_markup: { 
                    inline_keyboard: [[{ text: "✅ KREYE KAT LA", callback_data: `create_${orderId}` }]] 
                }
            })
        });

        alert("Demann ou an soumèt avèk siksè!");
        location.reload();
    }
</script>

</body>
</html>
