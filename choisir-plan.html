<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demann Kat Vityèl</title>
    <style>
        :root { --gold: #d4af37; --navy: #060e1b; }
        body { background: var(--navy); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; background: #112240; border: 1px solid rgba(212,175,55,0.3); padding: 12px; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-action { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Demann Kat Vityèl</h3>

    <div class="input-group">
        <label>Non</label>
        <input type="text" id="firstName" placeholder="Antre non ou">
    </div>

    <div class="input-group">
        <label>Prenon</label>
        <input type="text" id="lastName" placeholder="Antre prenon ou">
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@gmail.com">
    </div>

    <div class="input-group">
        <label>Nimewo Telefòn</label>
        <input type="tel" id="phone" placeholder="+509 XXXXXXXX">
    </div>

    <div class="input-group">
        <label>Peyi</label>
        <select id="country">
            <option value="">Chwazi peyi ou</option>
            <option value="HT">Haiti</option>
            <option value="US">United States</option>
            <option value="CA">Canada</option>
            <option value="FR">France</option>
            <option value="DO">Dominican Republic</option>
            <option value="BR">Brazil</option>
        </select>
    </div>

    <div class="input-group">
        <label>Adrès</label>
        <input type="text" id="address" placeholder="Adrès ou">
    </div>

    <div class="input-group">
        <label>Vil</label>
        <input type="text" id="city" placeholder="Vil ou">
    </div>

    <div class="input-group">
        <label>Kòd Postal</label>
        <input type="text" id="zipCode" placeholder="Kòd postal">
    </div>

    <div class="input-group">
        <label>Kalite Kat</label>
        <select id="cardType">
            <option value="STANDARD">STANDARD BLACK</option>
            <option value="GOLD">GOLD EDITION</option>
            <option value="VIP">VIP PLATINUM</option>
        </select>
    </div>

    <div class="input-group">
        <label>Montan Finansman Inisyal ($)</label>
        <input type="number" id="amount" placeholder="100">
    </div>

    <button class="btn-action" onclick="finalizeAll()">FINALIZA PEYEMAN</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));
    const botToken = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc";
    const chatID = -1003948852501;

    window.finalizeAll = async function() {
        const orderId = Date.now();
        const data = {
            nom: document.getElementById('firstName').value + " " + document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            country: document.getElementById('country').value,
            address: document.getElementById('address').value,
            city: document.getElementById('city').value,
            zip: document.getElementById('zipCode').value,
            plan: document.getElementById('cardType').value,
            montan: document.getElementById('amount').value
        };

        if(!data.nom || !data.email) return alert("Tanpri ranpli tout enfòmasyon yo!");

        await set(ref(db, 'demandes_cartes/' + orderId), data);

        const text = `💳 *NOUVO LÒD KAT*\n🆔 *ID:* ${orderId}\n👤 *Kliyan:* ${data.nom}\n📞 *Tel:* ${data.phone}\n📧 *Imel:* ${data.email}\n📍 *Adrès:* ${data.address}, ${data.city}\n💰 *Montan:* ${data.montan} USDT\n💳 *Kalite:* ${data.plan}`;
        
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                chat_id: chatID, 
                text: text, 
                parse_mode: 'Markdown',
                reply_markup: { inline_keyboard: [[{ text: "KREYE KAT LA", callback_data: `create_${orderId}` }]] }
            })
        });

        alert("Demann soumèt avèk siksè!");
        location.reload();
    }
</script>

</body>
</html>
