<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Kat Peye</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #060e1b; --card-bg: #112240; --white: #ffffff; --red: #e74c3c; --green: #2ecc71; --text: #8892b0; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 40px; }
        .container { max-width: 400px; margin: 0 auto; }
        .header-title { color: var(--gold); text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
        .card-wrapper { margin-bottom: 25px; }
        .visa-card { border-radius: 15px; padding: 15px; cursor: pointer; height: 120px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; transition: 0.3s; }
        .visa-card:hover { transform: scale(1.02); }
        .card-black { background: #1a1a1a; color: white; }
        .card-yellow-black { background: linear-gradient(135deg, #d4af37 50%, #000 50%); color: #fff; }
        .card-white-gold { background: linear-gradient(135deg, #ffffff 50%, #d4af37 50%); color: #000; }
        .visa-logo { font-size: 22px; font-weight: bold; z-index: 2; }
        .chip { width: 35px; height: 25px; background: linear-gradient(135deg, #e0c068, #b08d32); border-radius: 4px; z-index: 2; }
        .plan-info { display: flex; justify-content: space-between; align-items: flex-end; z-index: 2; }
        .plan-name { font-weight: bold; font-size: 14px; }
        .plan-price { font-size: 20px; font-weight: 900; }
        .card-prensip { background: rgba(17, 34, 64, 0.6); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 0 0 10px 10px; padding: 10px; margin-top: -5px; font-size: 11px; color: #ccd6f6; line-height: 1.4; display: flex; flex-direction: column; gap: 3px; }
        #form-screen, #amount-screen, #confirm-screen { display: none; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; color: var(--gold); font-size: 11px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .input-group input { width: 100%; background: #112240; border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; outline: none; }
        .loader { width: 18px; height: 18px; border: 2px solid #000; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-action { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="selection-screen">
        <h2 class="header-title">Chwazi Kat Ou</h2>
        <div class="card-wrapper">
            <div class="visa-card card-black" onclick="openForm('STANDARD BLACK')">
                <div class="visa-logo">VISA</div><div class="chip"></div>
                <div class="plan-info"><span class="plan-name">STANDARD</span><span class="plan-price">15 USDT</span></div>
            </div>
        </div>
        <div class="card-wrapper">
            <div class="visa-card card-yellow-black" onclick="openForm('GOLD EDITION')">
                <div class="visa-logo">VISA</div><div class="chip"></div>
                <div class="plan-info"><span class="plan-name">GOLD</span><span class="plan-price">19 USDT</span></div>
            </div>
        </div>
        <div class="card-wrapper">
            <div class="visa-card card-white-gold" onclick="openForm('VIP PLATINUM')">
                <div class="visa-logo" style="color:#000">VISA</div><div class="chip"></div>
                <div class="plan-info" style="color:#000"><span class="plan-name">VIP</span><span class="plan-price">20 USDT</span></div>
            </div>
        </div>
    </div>

    <div id="form-screen">
        <h2 class="header-title">Enfòmasyon Pèsonèl</h2>
        <div class="input-group"><label>Siyati</label><input type="text" id="lastName"></div>
        <div class="input-group"><label>Non</label><input type="text" id="firstName"></div>
        <div class="input-group"><label>Imel</label><input type="email" id="email"></div>
        <button class="btn-action" onclick="goToAmount()">KONTINYE</button>
    </div>

    <div id="amount-screen">
        <h2 class="header-title">Finansman</h2>
        <input type="number" id="typedAmount" placeholder="Montan ($)" style="width:100%; background:#112240; color:white; padding:15px; border:1px solid var(--gold);">
        <button class="btn-action" onclick="showConfirmation()">KONTINYE</button>
    </div>

    <div id="confirm-screen">
        <button class="btn-action" id="btnFinal" onclick="finalizeAll()">FINALIZA PEYEMAN <div class="loader" id="loaderFinal"></div></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));
    const botToken = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc";
    const chatID = -1003948852501;

    window.finalizeAll = async function() {
        document.getElementById('loaderFinal').style.display = "block";
        const orderId = Date.now();
        const data = {
            nom: document.getElementById('firstName').value + " " + document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            plan: selectedPlan,
            montan: document.getElementById('typedAmount').value,
            orderId: orderId
        };

        await set(ref(db, 'demandes_cartes/' + orderId), data);

        const text = `💳 *NOUVO LÒD KAT*\n🆔 *ID:* ${orderId}\n👤 *Kliyan:* ${data.nom}\n💰 *Montan:* ${data.montan} USDT`;
        
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                chat_id: chatID, 
                text: text, 
                parse_mode: 'Markdown',
                reply_markup: { inline_keyboard: [[{ text: "KREYE KAT LA", callback_data: `create_${orderId}` }]] }
            })
        });

        alert("Demann soumèt!");
        location.reload();
    }
</script>
<script>
    let selectedPlan = ""; 
    function openForm(p) { selectedPlan = p; document.getElementById('selection-screen').style.display = 'none'; document.getElementById('form-screen').style.display = 'block'; }
    function goToAmount() { document.getElementById('form-screen').style.display = 'none'; document.getElementById('amount-screen').style.display = 'block'; }
    function showConfirmation() { document.getElementById('amount-screen').style.display = 'none'; document.getElementById('confirm-screen').style.display = 'block'; }
</script>
</body>
</html>
