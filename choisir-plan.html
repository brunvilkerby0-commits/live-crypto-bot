<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Premium Cards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #060e1b; --card-bg: #112240; --white: #ffffff; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .container { max-width: 400px; margin: 0 auto; }

        /* --- KAT RÈDUIT --- */
        .header-title { color: var(--gold); text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
        
        .visa-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px; padding: 12px; margin-bottom: 12px;
            cursor: pointer; height: 110px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: 0.3s;
        }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .chip { width: 30px; height: 22px; background: linear-gradient(135deg, #e0c068, #b08d32); border-radius: 4px; }
        .visa-logo { font-size: 18px; font-weight: 900; font-style: italic; color: white; }
        .plan-price { font-size: 18px; font-weight: 900; color: var(--gold); }

        /* --- FÒMILÈ KI PA ZOOM (SLIM) --- */
        #form-screen { display: none; }
        .slim-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 10px; }
        .slim-header h3 { margin: 0; font-size: 14px; color: var(--gold); }
        .slim-header .price { font-size: 28px; font-weight: 900; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; color: var(--gold); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        
        .input-group input, .input-group select { 
            width: 100%; background: #112240; border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 10px; border-radius: 8px; color: white; box-sizing: border-box; 
            font-size: 14px; outline: none;
        }

        /* KYC SECTION */
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .kyc-box { 
            background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); 
            padding: 10px 5px; border-radius: 8px; text-align: center; cursor: pointer;
        }
        .kyc-box i { font-size: 18px; color: var(--gold); margin-bottom: 5px; }
        .kyc-box span { font-size: 9px; font-weight: bold; display: block; white-space: nowrap; }

        .btn-submit { 
            width: 100%; background: var(--gold); color: #000; border: none; 
            padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-top: 20px;
        }
        
        .back-link { text-align: center; font-size: 12px; margin-top: 20px; cursor: pointer; opacity: 0.6; color: white; display: block; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="selection-screen">
        <h2 class="header-title">Chwazi Kat Ou</h2>
        
        <div class="visa-card" onclick="showForm('STANDARD', 15)">
            <div class="card-top"><div class="chip"></div><div class="visa-logo">VISA</div></div>
            <div class="plan-price">15 USDT</div>
        </div>

        <div class="visa-card" onclick="showForm('PREMIUM GOLD', 19)" style="border-color: var(--gold);">
            <div class="card-top"><div class="chip"></div><div class="visa-logo" style="color: var(--gold);">VISA</div></div>
            <div class="plan-price">19 USDT</div>
        </div>

        <div class="visa-card" onclick="showForm('VIP LUXURY', 20)" style="background: #000; border-color: #fff;">
            <div class="card-top"><div class="chip" style="background: #eee;"></div><div class="visa-logo">VISA</div></div>
            <div class="plan-price">20 USDT</div>
        </div>
    </div>

    <div id="form-screen">
        <div class="slim-header">
            <h3 id="plan-name-label">PLAN</h3>
            <div class="price"><span id="price-tag">0</span> USDT</div>
        </div>

        <div class="input-group">
            <label>Nom Complet</label>
            <input type="text" id="fullName" placeholder="Brunvil Kerby">
        </div>
        
        <div class="input-group">
            <label>Peyi (Pays)</label>
            <select id="country">
                <option value="Haiti">Haiti</option>
                <option value="USA">USA</option>
                <option value="Canada">Canada</option>
                <option value="France">France</option>
                <option value="Dominican Republic">République Dominicaine</option>
                <option value="Chile">Chile</option>
                <option value="Brazil">Brazil</option>
            </select>
        </div>

        <div class="input-group">
            <label>WhatsApp</label>
            <input type="tel" id="whatsapp" placeholder="+509">
        </div>

        <div class="kyc-grid">
            <div class="kyc-box" onclick="alert('Kamera')"><i class="fas fa-id-card"></i><span>DEVAN</span></div>
            <div class="kyc-box" onclick="alert('Kamera')"><i class="fas fa-id-card"></i><span>DÈYÈ</span></div>
            <div class="kyc-box" onclick="alert('Kamera')"><i class="fas fa-camera"></i><span>SELFIE</span></div>
        </div>

        <button class="btn-submit" onclick="submitOrder()">KONFIME PEYEMAN</button>

        <a href="#" onclick="location.reload()" class="back-link">← Chanje kat</a>
    </div>

</div>

<script>
    function showForm(name, price) {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
        document.getElementById('plan-name-label').innerText = name;
        document.getElementById('price-tag').innerText = price;
    }

    function submitOrder() {
        alert("Demann ou an voye bay admin Live Crypto Bot!");
    }
</script>

</body>
</html>
