<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Kat Vityèl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-bg: #112240; --white: #ffffff; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 450px; margin: 0 auto; }

        /* --- PAJ CHWA KAT --- */
        #selection-screen { display: block; }
        .header-title { color: var(--gold); text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 30px; text-transform: uppercase; }
        
        .plan-card {
            background: linear-gradient(145deg, #112240, #0a192f);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px; padding: 25px; margin-bottom: 15px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .plan-card:active { transform: scale(0.96); border-color: var(--gold); }
        .plan-card .name { font-weight: bold; font-size: 14px; opacity: 0.8; letter-spacing: 1px; }
        .plan-card .price { font-size: 24px; font-weight: 900; color: var(--gold); display: block; margin-top: 5px; }

        /* --- PAJ FÒMILÈ --- */
        #form-screen { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-header { 
            background: var(--gold); color: var(--navy); 
            padding: 20px; border-radius: 12px; text-align: center; 
            margin-bottom: 25px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }
        .form-header h3 { margin: 0; font-size: 14px; text-transform: uppercase; }
        .form-header .current-price { font-size: 32px; font-weight: 900; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .input-group input { 
            width: 100%; background: var(--card-bg); border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 15px; border-radius: 10px; color: white; box-sizing: border-box; font-size: 16px; outline: none;
        }
        .input-group input:focus { border-color: var(--gold); }

        /* FOTO KYC */
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .kyc-box { 
            background: rgba(255,255,255,0.03); border: 1px dashed var(--gold); 
            padding: 15px; border-radius: 10px; text-align: center; cursor: pointer;
        }
        .kyc-box i { font-size: 20px; color: var(--gold); margin-bottom: 5px; }
        .kyc-box span { display: block; font-size: 11px; font-weight: bold; }

        /* BOUTON VOYE */
        .btn-submit { 
            width: 100%; background: var(--gold); color: var(--navy); border: none; 
            padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
        .btn-submit:active { transform: scale(0.97); }

        .loader { display: none; width: 25px; height: 25px; border: 3px solid var(--navy); border-top: 3px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    
    <div id="selection-screen">
        <h2 class="header-title">Chwazi Modèl Kat Ou</h2>
        
        <div class="plan-card" onclick="showForm(15)">
            <div><span class="name">STANDARD</span><span class="price">15 USDT</span></div>
            <i class="fas fa-chevron-right" style="color: var(--gold)"></i>
        </div>

        <div class="plan-card" onclick="showForm(19)" style="border-color: var(--gold)">
            <div><span class="name" style="color: var(--gold)">PREMIUM GOLD</span><span class="price">19 USDT</span></div>
            <i class="fas fa-crown" style="color: var(--gold)"></i>
        </div>

        <div class="plan-card" onclick="showForm(20)" style="background: #000; border-color: var(--gold)">
            <div><span class="name" style="color: var(--gold)">VIP LUXURY</span><span class="price">20 USDT</span></div>
            <i class="fas fa-gem" style="color: var(--gold)"></i>
        </div>
    </div>

    <div id="form-screen">
        <div class="form-header">
            <h3>MODÈL CHWAZI A</h3>
            <div class="current-price"><span id="price-tag">0</span> USDT</div>
        </div>

        <div class="input-group">
            <label>NON KONPLÈ</label>
            <input type="text" id="fullname" placeholder="Ex: Jean Dupont">
        </div>
        <div class="input-group">
            <label>EMAIL</label>
            <input type="email" id="email" placeholder="votre@email.com">
        </div>
        <div class="input-group">
            <label>TÉLÉPHONE</label>
            <input type="tel" id="phone" placeholder="+509 0000-0000">
        </div>

        <div class="kyc-grid">
            <div class="kyc-box" onclick="alert('Kamera ID Devan')">
                <i class="fas fa-camera"></i>
                <span>DEVAN ID</span>
            </div>
            <div class="kyc-box" onclick="alert('Kamera ID Dèyè')">
                <i class="fas fa-camera"></i>
                <span>DÈYÈ ID</span>
            </div>
        </div>

        <button class="btn-submit" id="mainBtn" onclick="processPayment()">
            <span id="btnText">KONFIME & PEYE</span>
            <div class="loader" id="btnLoader"></div>
        </button>

        <p onclick="location.reload()" style="text-align:center; font-size:12px; margin-top:20px; cursor:pointer; opacity:0.6;">
            <i class="fas fa-arrow-left"></i> Chanje modèl kat
        </p>
    </div>

</div>

<script>
    function showForm(price) {
        // Chanje ekran
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
        
        // Mete pri a kote li dwe ye
        document.getElementById('price-tag').innerText = price;
        window.scrollTo(0,0);
    }

    function processPayment() {
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const mainBtn = document.getElementById('mainBtn');

        // Mouvman loading
        btnText.style.display = 'none';
        btnLoader.style.display = 'block';
        mainBtn.style.opacity = '0.7';

        setTimeout(() => {
            alert("Enfòmasyon ou yo anrejistre! N ap redireksyon w pou pèman an.");
            // Isit la ou ka mete lyen pou l al peye a
            location.reload(); 
        }, 2000);
    }
</script>

</body>
</html>
