<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Kat Peye</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #060e1b; color: white; font-family: Arial, sans-serif; padding: 15px; }
        .container { max-width: 400px; margin: auto; }
        .header { text-align: center; color: #d4af37; margin-bottom: 20px; font-weight: 800; }
        .card { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .price { font-size: 20px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background: #112240; color: white; box-sizing: border-box; }
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .kyc-box { background: #112240; border: 1px dashed #d4af37; padding: 10px; border-radius: 8px; text-align: center; font-size: 10px; cursor: pointer; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #d4af37; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #form-screen, #amount-screen { display: none; }
    </style>
</head>
<body>

<div id="selection-screen" class="container">
    <h2 class="header">Chwazi Kat Ou</h2>
    <div class="card" onclick="openForm('STANDARD', 15)"><h3>VISA STANDARD</h3><div class="price">15 USDT</div></div>
    <div class="card" onclick="openForm('GOLD', 19)"><h3>VISA GOLD</h3><div class="price">19 USDT</div></div>
    <div class="card" onclick="openForm('VIP', 20)"><h3>VISA VIP</h3><div class="price">20 USDT</div></div>
</div>

<div id="form-screen" class="container">
    <h2 class="header">Enfòmasyon Kliyan</h2>
    <input type="text" id="nom" placeholder="Non">
    <input type="text" id="prenom" placeholder="Prenon">
    <input type="tel" id="tel" placeholder="Nimewo">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="adresse" placeholder="Adrès">
    <input type="text" id="vil" placeholder="Vil">
    
    <div class="kyc-grid">
        <div class="kyc-box">DEVAN</div>
        <div class="kyc-box">DÈYÈ</div>
        <div class="kyc-box">SELFIE</div>
    </div>
    <button onclick="goToAmount()">KONTINYE</button>
</div>

<div id="amount-screen" class="container">
    <h2 class="header">Montan pou chaje</h2>
    <input type="number" id="montan" placeholder="Tape montan an ($)">
    <button onclick="finalize()">FINALIZA PEYEMAN</button>
</div>

<script>
    function openForm(card, price) {
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
    }

    function goToAmount() {
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('amount-screen').style.display = 'block';
    }

    function finalize() {
        const montan = document.getElementById('montan').value;
        if(!montan) { alert("Tanpri antre montan an!"); return; }
        alert("Enfòmasyon ak montan anrejistre. Bridgecard ap kreye kat la...");
    }
</script>

</body>
</html>
