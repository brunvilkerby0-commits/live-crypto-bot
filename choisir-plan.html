<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commander une Carte - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card: #112240; --white: #ffffff; }
        body { background: var(--navy); color: var(--white); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .main-container { width: 100%; max-width: 600px; text-align: center; }
        h2 { color: var(--gold); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        /* 3 PLAN YO */
        .plans-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .plan-box { 
            background: var(--card); border: 1px solid rgba(212, 175, 55, 0.3); padding: 20px; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }
        .plan-box:hover { border-color: var(--gold); transform: scale(1.02); }
        .plan-box.active { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .plan-title { color: var(--gold); font-weight: bold; font-size: 20px; margin-bottom: 5px; }
        .plan-price { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        .plan-price span { font-size: 14px; color: #888; }

        /* FORM KYC (KACHE) */
        #kyc-section { display: none; margin-top: 30px; background: var(--card); padding: 25px; border-radius: 15px; text-align: left; border-top: 3px solid var(--gold); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0a192f; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }

        .btn-submit { background: var(--gold); color: var(--navy); border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 id="page-title">Choisissez votre Plan</h2>

    <div id="plans-section" class="plans-wrapper">
        <div class="plan-box" onclick="showKYC('Standard', 15)">
            <div class="plan-title">Standard</div>
            <div class="plan-price">15 <span>USDT</span></div>
            <p style="font-size: 12px; color: #aaa;">Frais de création inclus • Limite 2,000$</p>
        </div>

        <div class="plan-box" onclick="showKYC('Premium', 19)" style="background: linear-gradient(145deg, #112240, #1a365d);">
            <div class="plan-title">Premium Gold</div>
            <div class="plan-price">19 <span>USDT</span></div>
            <p style="font-size: 12px; color: #aaa;">Frais de création inclus • Limite 5,000$</p>
        </div>

        <div class="plan-box" onclick="showKYC('VIP Luxury', 20)">
            <div class="plan-title">VIP Luxury</div>
            <div class="plan-price">20 <span>USDT</span></div>
            <p style="font-size: 12px; color: #aaa;">Frais de création inclus • Limite Illimitée</p>
        </div>
    </div>

    <div id="kyc-section">
        <h3 style="color:var(--gold); text-align:center;">Informations personnelles</h3>
        <p style="font-size: 11px; text-align:center; margin-bottom: 20px;">Plan sélectionné: <span id="selected-name" style="font-weight:bold;"></span></p>
        
        <form id="cardForm">
            <div class="input-group">
                <label>Nom complet (Tel que sur ID)</label>
                <input type="text" id="fullname" placeholder="Jean Robert Dupont" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="votre@email.com" required>
            </div>
            <div class="input-group">
                <label>Téléphone (Avec code pays)</label>
                <input type="text" id="phone" placeholder="+509 0000 0000" required>
            </div>
            <div class="input-group">
                <label>Pays de résidence</label>
                <select id="country" required>
                    <option value="HT">Haïti</option>
                    <option value="US">États-Unis</option>
                    <option value="FR">France</option>
                    <option value="CA">Canada</option>
                    <option value="DR">République Dominicaine</option>
                    <option value="BR">Brésil</option>
                    <option value="CL">Chili</option>
                    </select>
            </div>
            <div class="input-group">
                <label>Adresse Résidentielle</label>
                <input type="text" id="address" placeholder="Rue, Numéro, Ville" required>
            </div>
            
            <button type="button" class="btn-submit" onclick="goToPayment()">CONTINUER VERS LE PAIEMENT</button>
        </form>
    </div>
</div>

<script>
    let currentPrice = 0;

    function showKYC(name, price) {
        currentPrice = price;
        document.getElementById('plans-section').style.display = 'none';
        document.getElementById('page-title').innerText = 'Détails du titulaire';
        document.getElementById('kyc-section').style.display = 'block';
        document.getElementById('selected-name').innerText = name + " (" + price + " USDT)";
    }

    function goToPayment() {
        const email = document.getElementById('email').value;
        const name = document.getElementById('fullname').value;
        
        if(!email || !name) {
            alert("Veuillez remplir tous les champs");
            return;
        }

        // Sove done yo pou Dashboard la ka sèvi avèk yo
        localStorage.setItem('userEmail', email);
        localStorage.setItem('pendingPrice', currentPrice);
        
        alert("Enregistré ! Redirection vers la page de paiement...");
        window.location.href = 'paiement.html';
    }
</script>

</body>
</html>
