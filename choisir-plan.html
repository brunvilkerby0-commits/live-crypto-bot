<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kat Virtuel - Bridgecard</title>
    <style>
        body { background: #060e1b; color: white; font-family: Arial, sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        h2 { text-align: center; color: #d4af37; }
        .card { padding: 20px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        .std { background: #1a1a1a; border: 1px solid #d4af37; }
        .gold { background: linear-gradient(135deg, #d4af37, #000); }
        .vip { background: linear-gradient(135deg, #fff, #d4af37); color: #000; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background: #112240; color: white; box-sizing: border-box; }
        .kyc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .kyc-box { background: #112240; border: 1px dashed #d4af37; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #d4af37; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="selection-screen" class="container">
    <h2>Chwazi Kat Ou</h2>
    <div class="card std" onclick="openForm('STANDARD', 15)">VISA STANDARD - 15 USDT</div>
    <div class="card gold" onclick="openForm('GOLD', 19)">VISA GOLD - 19 USDT</div>
    <div class="card vip" onclick="openForm('VIP', 20)">VISA VIP - 20 USDT</div>
</div>

<div id="form-screen" class="container hidden">
    <h2>Enfòmasyon Kliyan</h2>
    <div id="card-info" style="text-align:center; margin-bottom:15px; color:#d4af37;"></div>
    
    <input type="text" id="nom" placeholder="Non">
    <input type="text" id="prenom" placeholder="Prenon">
    <select id="country">
        <option value="+509">Haiti (+509)</option>
        <option value="+1">USA (+1)</option>
    </select>
    <input type="tel" id="tel" placeholder="Telefòn">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="adresse" placeholder="Adrès">
    <input type="text" id="vil" placeholder="Vil">

    <label style="font-size:12px;">VÉRIFIKASYON (KYC)</label>
    <div class="kyc-grid">
        <div class="kyc-box" onclick="document.getElementById('f1').click()">DEVAN</div>
        <div class="kyc-box" onclick="document.getElementById('f2').click()">DÈYÈ</div>
        <div class="kyc-box" onclick="document.getElementById('f3').click()">SELFIE</div>
    </div>
    <input type="file" id="f1" class="hidden" accept="image/*" capture="environment">
    <input type="file" id="f2" class="hidden" accept="image/*" capture="environment">
    <input type="file" id="f3" class="hidden" accept="image/*" capture="user">

    <button onclick="submitBridgecard()">FINALIZA PEYEMAN</button>
    <button onclick="goBack()" style="background:#555;">Retounen</button>
</div>

<script>
    const API_KEY = "At_test_edc10d0f79bb447aa86e1214fe2ac6a4eef3580107d0a2ce0f7b088318ae71b3efd92321487058b5aa2a172c5c9ada1f77127640e99761cbfcb3578ba31b713a7a7a56f36e208521389f9c5745bd95c2bbc78858d625ce8ad9645ea6c8aea3f9fc5e44972e8ceaa1940833a9fe86f074989738d6df1702b1ede5a90fcbe63ffedc6e506c7bd35c3ffa714e53f38ee363f72ba8cfde4c1365aa3e5994176fa3ff2c0fe63da100665836f7b973b9e5c757a1af6e7df671b0b6291775e6c847bd57f429b34b3e5399ece8918f3c3d955c13677a548382ca04fbe3b57c3d3208c655b56d7d7aee88c1bb33bf0412fabc8692895c6894ff9a0b137f8c02899e1c40d6";

    let selectedCard = "", selectedPrice = 0;

    function openForm(card, price) {
        selectedCard = card; selectedPrice = price;
        document.getElementById("selection-screen").style.display = "none";
        document.getElementById("form-screen").style.display = "block";
        document.getElementById("card-info").innerHTML = `<b>${card}</b> - ${price} USDT`;
    }

    function goBack() {
        document.getElementById("form-screen").style.display = "none";
        document.getElementById("selection-screen").style.display = "block";
    }

    async function submitBridgecard() {
        const data = {
            nom: document.getElementById('nom').value,
            prenom: document.getElementById('prenom').value,
            tel: document.getElementById('country').value + document.getElementById('tel').value,
            email: document.getElementById('email').value
        };

        if(!data.nom || !data.email) { alert("Tanpri ranpli tout enfòmasyon yo!"); return; }

        alert("Koneksyon ak Bridgecard an pwogrè...");

        try {
            const res = await fetch('https://api.bridgecard.io/v1/cards', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + API_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if(res.ok) alert("Siksè! Kat la ap trete.");
            else alert("Erè: Tanpri verifye done yo.");
        } catch(e) { alert("Erè rezo."); }
    }
</script>
</body>
</html>
