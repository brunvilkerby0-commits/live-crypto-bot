<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Jesyon KYC</title>
    <style>
        body { background: #0b1426; color: white; font-family: sans-serif; padding: 20px; }
        .login-box { text-align: center; margin-top: 50px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button { background: #d4af37; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .box { background: #111e38; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #d4af37; }
        #admin-panel { display: none; }
        .status { font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-box" class="login-box">
        <h2>🔒 Aksè Admin</h2>
        <input type="password" id="pass" placeholder="Modpas...">
        <button onclick="checkPass()">Konekte</button>
    </div>

    <div id="admin-panel">
        <h1>Demann KYC Itilizatè yo</h1>
        <div id="kyc-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));

        window.checkPass = () => {
            if(document.getElementById('pass').value === "4115kb") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('admin-panel').style.display = "block";
            } else { alert("Modpas mal!"); }
        };

        window.valide = (id) => {
            update(ref(db, 'users/' + id), { kycStatus: 'Valide' });
            alert("Kont la valide avèk siksè!");
        };

        onValue(ref(db, 'users'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('kyc-list');
            list.innerHTML = "";
            
            if (!data) { list.innerHTML = "<p>Pa gen okenn done kounye a.</p>"; return; }

            for(let id in data) {
                let user = data[id];
                list.innerHTML += `
                <div class="box">
                    <p><b>Non:</b> ${user.first_name || 'N/A'} ${user.last_name || ''}</p>
                    <p><b>Imel:</b> ${user.email_address || 'N/A'}</p>
                    <p><b>Plan:</b> ${user.plan || 'N/A'}</p>
                    <p><b>Estati:</b> 
                        <span class="status" style="color:${user.kycStatus === 'Valide' ? '#2ecc71' : '#e74c3c'}">
                            ${user.kycStatus === 'Valide' ? '✅ Valide' : '❌ An atant'}
                        </span>
                    </p>
                    ${user.kycStatus !== 'Valide' ? 
                        `<button onclick="valide('${id}')" style="background:#2ecc71; color:white; width:100%;">VALIDE KONT SA A</button>` 
                        : '<p style="color:#2ecc71;">Kont sa a deja aktive.</p>'}
                </div>`;
            }
        });
    </script>
</body>
</html>
