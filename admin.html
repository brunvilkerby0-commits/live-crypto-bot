<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Live Crypto Bot - Panel Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b1426; color: #ffffff; padding: 20px; }
        #admin-content { display: none; }
        .container { max-width: 1100px; margin: 0 auto; }
        .user-table { width: 100%; border-collapse: collapse; background: #111e38; border-radius: 8px; border: 1px solid #1f3663; margin-bottom: 30px; }
        th, td { padding: 12px; border-bottom: 1px solid #1f3663; text-align: left; }
        th { background: #1f3663; color: #f1c40f; }
        .btn-action { background: #f1c40f; color: #0b1426; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0b1426; display:flex; justify-content:center; align-items:center;">
    <div style="background:#111e38; padding:30px; border-radius:8px; text-align:center;">
        <input type="password" id="admin-pass-input" placeholder="Modpas Admin..."><br><br>
        <button class="btn-action" onclick="verifyAdminPassword()">Konekte</button>
    </div>
</div>

<div id="admin-content" class="container">
    <h1>🎛️ PANEL ADMIN - KONTWÒL TOTAL</h1>

    <h2>👥 Lis Itilizatè yo & Modpas</h2>
    <table class="user-table">
        <thead>
            <tr><th>Itilizatè</th><th>Imel</th><th>Modpas</th><th>Solde (USDT)</th><th>Aksyon</th></tr>
        </thead>
        <tbody id="users-list"></tbody>
    </table>

    <h2>🆔 Demann KYC (Validasyon)</h2>
    <table class="user-table">
        <thead>
            <tr><th>Kliyan</th><th>Dokiman/Info</th><th>Status</th><th>Aksyon</th></tr>
        </thead>
        <tbody id="kyc-list"></tbody>
    </table>

    <h2>💸 Demand Retrè</h2>
    <table class="user-table">
        <thead>
            <tr><th>Kliyan</th><th>Kantite</th><th>Status</th><th>Aksyon</th></tr>
        </thead>
        <tbody id="withdrawals-list"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));

    window.verifyAdminPassword = () => {
        if(document.getElementById('admin-pass-input').value === "4115kb") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
        } else { alert("Modpas mal!"); }
    };

    // 1. Lis Itilizatè + Modpas
    onValue(ref(db, 'users'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('users-list');
        tbody.innerHTML = "";
        for(let id in data) {
            let u = data[id];
            tbody.innerHTML += `<tr>
                <td>${u.prenon || 'Moun'} ${u.non || ''}</td>
                <td>${u.email || ''}</td>
                <td><code>${u.password || 'N/A'}</code></td>
                <td>${u.soldeUSDT || 0}</td>
                <td><button class="btn-action" onclick="alert('Ajoute fonksyon edit')">Edit</button></td>
            </tr>`;
        }
    });

    // 2. KYC (Koute kote ou estoke KYC yo)
    onValue(ref(db, 'kyc_requests'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('kyc-list');
        tbody.innerHTML = "";
        for(let id in data) {
            let k = data[id];
            tbody.innerHTML += `<tr>
                <td>${k.userEmail}</td>
                <td><a href="${k.photoURL}" target="_blank">Wè Foto</a></td>
                <td>${k.status || 'Atant'}</td>
                <td>
                    <button class="btn-green" onclick="updateStatus('kyc_requests/${id}', 'Valide')">Valide</button>
                    <button class="btn-red" onclick="updateStatus('kyc_requests/${id}', 'Rejete')">Rejete</button>
                </td>
            </tr>`;
        }
    });

    window.updateStatus = (path, status) => {
        update(ref(db, path), { status: status }).then(() => alert("Sove!"));
    };

    // 3. Retrè
    onValue(ref(db, 'withdrawals'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('withdrawals-list');
        tbody.innerHTML = "";
        for(let id in data) {
            let w = data[id];
            tbody.innerHTML += `<tr>
                <td>${w.userNom}</td>
                <td>${w.amount} USDT</td>
                <td>${w.status}</td>
                <td><button class="btn-green" onclick="updateStatus('withdrawals/${id}', 'success')">Peye</button></td>
            </tr>`;
        }
    });
</script>
</body>
</html>
