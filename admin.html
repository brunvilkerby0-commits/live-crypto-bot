<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin</title>
    <style>
        body { background: #0b1426; color: white; font-family: sans-serif; padding: 20px; }
        .login-box { text-align: center; margin-top: 50px; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { background: #d4af37; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        .box { background: #111e38; padding: 15px; margin: 10px; border-radius: 8px; border: 1px solid #d4af37; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <div id="login-box" class="login-box">
        <h2>🔒 Aksè Admin</h2>
        <input type="password" id="pass" placeholder="Modpas...">
        <button onclick="checkPass()">Konekte</button>
    </div>

    <div id="admin-panel">
        <h1>Demann KYC</h1>
        <div id="kyc-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));

        window.checkPass = () => {
            if(document.getElementById('pass').value === "4115kb") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('admin-panel').style.display = "block";
            } else { alert("Modpas mal!"); }
        };

        onValue(ref(db, 'users'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('kyc-list');
            list.innerHTML = "";
            for(let id in data) {
                if(data[id].kycStatus === "en_attente") {
                    list.innerHTML += `<div class="box">
                        <p>Kliyan: ${data[id].kycFullName || 'Itilizatè'} (ID: ${id})</p>
                        <button onclick="valide('${id}')" style="background:#2ecc71; color:white;">Valide</button>
                    </div>`;
                }
            }
        });

        window.valide = (id) => {
            update(ref(db, 'users/' + id), { kycStatus: 'Valide', kycVerified: true });
            alert("Kont valide!");
        };
    </script>
</body>
</html>
