<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Live Crypto Bot - Panel Admin</title>
    <style>
        /* Kenbe tout CSS ou an menm jan pou style la pa chanje */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b1426; color: #ffffff; margin: 0; padding: 20px; }
        #admin-content { display: none; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1426; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; }
        .login-box { background: #111e38; padding: 30px; border-radius: 8px; border: 1px solid #1f3663; text-align: center; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #f1c40f; text-align: center; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; }
        h2 { color: #f1c40f; margin-top: 40px; border-left: 4px solid #f1c40f; padding-left: 10px; }
        .user-table { width: 100%; border-collapse: collapse; background: #111e38; border-radius: 8px; overflow: hidden; border: 1px solid #1f3663; margin-bottom: 30px; }
        .user-table th, .user-table td { padding: 12px 15px; text-align: left; }
        .user-table th { background-color: #1f3663; color: #f1c40f; }
        .btn-action { background: #f1c40f; color: #0b1426; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div id="login-screen" class="login-overlay">
    <div class="login-box">
        <h2>🔒 Aksè Rezève</h2>
        <input type="password" id="admin-pass-input" placeholder="Modpas Admin..."><br><br>
        <button class="btn-action" onclick="verifyAdminPassword()">Konekte</button>
    </div>
</div>

<div id="admin-content" class="container">
    <h1>🎛️ PANEL ADMIN - KONTWÒL TOTAL</h1>

    <h2>👥 Itilizatè yo & Modpas</h2>
    <table class="user-table">
        <thead><tr><th>Itilizatè</th><th>Imel</th><th>Modpas</th><th>Solde (USDT)</th></tr></thead>
        <tbody id="users-list"></tbody>
    </table>

    <h2>🆔 Demann KYC</h2>
    <table class="user-table">
        <thead><tr><th>Kliyan</th><th>Status</th><th>Aksyon</th></tr></thead>
        <tbody id="kyc-list"></tbody>
    </table>

    <h2>💸 Retrè</h2>
    <table class="user-table" id="withdrawals-list"></table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));

    window.verifyAdminPassword = () => {
        if(document.getElementById('admin-pass-input').value === "4115kb") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
        } else { alert("Modpas mal!"); }
    };

    // Chaje Lis Itilizatè
    onValue(ref(db, 'users'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('users-list');
        tbody.innerHTML = "";
        for(let id in data) {
            let u = data[id];
            tbody.innerHTML += `<tr><td>${u.username || 'Moun'}</td><td>${u.email || ''}</td><td><code>${u.password || 'N/A'}</code></td><td>${u.soldeUSDT || 0}</td></tr>`;
        }
    });

    // Chaje KYC
    onValue(ref(db, 'kyc_requests'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('kyc-list');
        tbody.innerHTML = "";
        for(let id in data) {
            let k = data[id];
            tbody.innerHTML += `<tr>
                <td>${k.userEmail}</td>
                <td>${k.status || 'An atant'}</td>
                <td>
                    <button class="btn-success" onclick="updateStatus('kyc_requests/${id}', 'Valide')">Valide</button>
                    <button class="btn-danger" onclick="updateStatus('kyc_requests/${id}', 'Rejete')">Rejete</button>
                </td>
            </tr>`;
        }
    });

    window.updateStatus = (path, status) => {
        update(ref(db, path), { status: status }).then(() => alert("Mizajou fèt!"));
    };
</script>
</body>
</html>
