    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));

        window.checkPass = () => {
            if(document.getElementById('pass').value === "4115kb") {
                document.getElementById('login-box').style.display = "none";
                document.getElementById('admin-panel').style.display = "block";
            } else { alert("Modpas mal!"); }
        };

        // Li tout itilizatè yo
        onValue(ref(db, 'users'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('kyc-list');
            list.innerHTML = "";
            
            if (!data) { list.innerHTML = "<p>Pa gen okenn done.</p>"; return; }

            for(let id in data) {
                let user = data[id];
                list.innerHTML += `
                <div class="box">
                    <p><b>Kliyan:</b> ${user.first_name || 'N/A'} ${user.last_name || ''}</p>
                    <p><b>Imel:</b> ${user.email_address || 'N/A'}</p>
                    <p><b>Estati:</b> <span style="color:${user.kycStatus === 'Valide' ? '#2ecc71' : '#e74c3c'}">
                        ${user.kycStatus === 'Valide' ? '✅ Valide' : '❌ An atant'}
                    </span></p>
                    
                    ${user.kycStatus !== 'Valide' ? 
                        `<button onclick="valide('${id}')" style="background:#2ecc71; color:white; width:100%; padding:10px; border-radius:5px; border:none; cursor:pointer;">
                            VALIDE KONT SA A
                        </button>` 
                        : ''}
                </div>`;
            }
        });

        // Fonksyon pou valide a
        window.valide = (id) => {
            update(ref(db, 'users/' + id), { kycStatus: 'Valide' });
            alert("Kont la valide avèk siksè!");
        };
    </script>
