<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mes Cartes - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-size: 20px; }

        /* DESIGN KAT LA */
        .credit-card {
            width: 100%; max-width: 350px; height: 200px;
            background: linear-gradient(135deg, #1a2a44 0%, #112240 100%);
            border-radius: 20px; margin: 0 auto 30px; padding: 25px;
            box-sizing: border-box; position: relative;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .credit-card::before {
            content: ''; position: absolute; top: -50%; right: -20%;
            width: 250px; height: 250px; background: rgba(212, 175, 55, 0.05);
            border-radius: 50%;
        }
        .chip { width: 45px; height: 35px; background: linear-gradient(135deg, #f1d279, #d4af37); border-radius: 5px; margin-bottom: 20px; }
        .card-number { font-size: 20px; letter-spacing: 3px; color: white; font-family: 'Courier New', monospace; margin-bottom: 15px; }
        .card-holder { font-size: 10px; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        .card-name { font-size: 16px; color: white; font-weight: bold; margin-top: 5px; }
        .visa-logo { position: absolute; bottom: 25px; right: 25px; font-style: italic; font-weight: bold; font-size: 24px; color: white; }

        /* BOUTON YO */
        .action-box { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-action {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; border-radius: 12px; font-weight: bold;
            text-decoration: none; margin-bottom: 12px; transition: 0.3s;
        }
        .btn-primary { background: var(--gold); color: var(--navy); }
        .btn-secondary { border: 1px solid var(--gold); color: var(--gold); background: transparent; }
        
        .status-msg { background: rgba(212, 175, 55, 0.1); padding: 10px; border-radius: 8px; font-size: 12px; text-align: center; color: var(--gold); margin-bottom: 15px; border: 1px dashed var(--gold); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-credit-card" style="font-size: 30px; color: var(--gold); margin-bottom: 10px;"></i>
        <h2>Mes Cartes</h2>
    </div>

    <div class="credit-card">
        <div class="chip"></div>
        <div class="card-number">**** **** **** ****</div>
        <div style="display: flex; justify-content: space-between;">
            <div>
                <div class="card-holder">Nom du Titulaire</div>
                <div class="card-name">BRUNVIL KERBY</div>
            </div>
            <div>
                <div class="card-holder">Expire</div>
                <div class="card-name">--/--</div>
            </div>
        </div>
        <div class="visa-logo">VISA</div>
    </div>

    <div class="action-box">
        <div class="status-msg">
            <i class="fas fa-info-circle"></i> Votre carte est inactive. Passez le KYC pour l'activer.
        </div>
        
        <a href="kyc-carte.html" class="btn-action btn-primary">
            <i class="fas fa-user-check"></i> PASSER LE KYC CARTE
        </a>
        
        <a href="depot.html" class="btn-action btn-secondary">
            <i class="fas fa-plus"></i> RECHARGER LA CARTE
        </a>
    </div>

    <a href="index.html" style="display: block; text-align: center; margin-top: 30px; color: var(--text); text-decoration: none; font-size: 14px; opacity: 0.7;">
        <i class="fas fa-arrow-left"></i> Retour au Dashboard
    </a>

</body>
</html>
