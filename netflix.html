<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netflix Activation - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--navy); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        .main-wrapper {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; box-sizing: border-box;
        }

        .header-title { text-align: center; margin-bottom: 25px; margin-top: 20px; }
        .header-title h1 { color: var(--gold); font-size: 24px; margin: 0; font-weight: 900; letter-spacing: 2px; }
        
        .card { 
            background: var(--card-dark); color: white; padding: 25px; 
            border-radius: 20px; width: 100%; max-width: 450px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .m-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .m-btn { 
            background: rgba(255,255,255,0.05); padding: 12px 5px; border-radius: 12px; 
            text-align: center; cursor: pointer; border: 2px solid transparent; 
            font-size: 10px; color: var(--text); font-weight: bold; transition: 0.3s;
        }
        .m-btn.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: white; }

        .pay-info-box { 
            background: #000; padding: 15px; border-radius: 12px; 
            margin-bottom: 20px; border: 1px dashed var(--gold); text-align: center; 
        }

        input { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); color: white; outline: none; margin-bottom: 15px;
        }
        label { font-size: 11px; color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }

        .btn-pay { 
            width: 100%; padding: 16px; background: var(--gold); color: black; 
            border: none; border-radius: 12px; font-weight: 900; cursor: pointer; 
            font-size: 16px; text-transform: uppercase; width: 100%;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header-title">
        <h1>LIVE CRYPTO BOT</h1>
        <p style="color: var(--text); opacity: 0.6; font-size: 12px;">Pwojè Live Crypto Bot</p>
    </div>

    <div class="card">
        <form action="https://formspree.io/f/VRE_EMAIL_OU_LA" method="POST" enctype="multipart/form-data">
            
            <div style="text-align: center; margin-bottom: 20px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" width="120">
                <h3 style="margin: 10px 0 0 0;">Plan 1 Mwa - <span style="color: var(--gold);">12.00$</span></h3>
            </div>

            <div class="m-grid">
                <div onclick="switchPay('bep20')" id="m-bep20" class="m-btn active">BEP20</div>
                <div onclick="switchPay('trc20')" id="m-trc20" class="m-btn">TRC20</div>
                <div onclick="switchPay('moncash')" id="m-moncash" class="m-btn">MonCash</div>
            </div>

            <div class="pay-info-box">
                <p id="pay-label" style="font-size: 10px; color: var(--gold); margin: 0; font-weight: bold;">ADRÈS USDT (BEP20)</p>
                <strong id="pay-addr" style="font-size: 13px; color: #fff; word-break: break-all;">0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396</strong>
            </div>

            <label>Email Netflix la</label>
            <input type="email" name="email_netflix" required placeholder="egzamp@gmail.com">
            
            <label>ID Tranzaksyon / NIP</label>
            <input type="text" name="id_peman" required placeholder="ID Peman an">

            <label>Screenshot Peman (OBLIGATWA)</label>
            <input type="file" name="upload" accept="image/*" required>

            <button type="submit" class="btn-pay">KONFIME PEMAN 12.00$</button>
        </form>
    </div>
</div>

<script>
    const pData = {
        bep20: { label: "ADRÈS USDT (BEP20)", val: "0x7fD50dAAfeA0a8Df3E4860ECC81939fFBaa11396" },
        trc20: { label: "ADRÈS USDT (TRC20)", val: "TYDHcrwhGkRH68u2fWat72iJoNFqhoadHy" },
        moncash: { label: "NIMEWO MONCASH", val: "31800614" }
    };

    function switchPay(id) {
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-'+id).classList.add('active');
        document.getElementById('pay-label').innerText = pData[id].label;
        document.getElementById('pay-addr').innerText = pData[id].val;
    }
</script>
</body>
</html>
