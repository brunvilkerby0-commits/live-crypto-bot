<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres & Sécurité - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #0a192f; --card: #112240; --gold: #d4af37; --blue: #0063e5; --text: #ccd6f6; }
        body { background: var(--navy); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-bottom: 50px; }
        
        .container { width: 100%; max-width: 450px; margin: auto; }
        
        /* Tit */
        h2 { color: var(--gold); font-size: 22px; margin-bottom: 20px; text-transform: uppercase; border-left: 4px solid var(--gold); padding-left: 10px; }

        .section-card { 
            background: var(--card); padding: 20px; border-radius: 18px; 
            border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* 1. INFO COMPTE */
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .info-row span:first-child { color: var(--gold); font-weight: bold; }

        /* 2. INPUTS MODPAS */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text); margin-bottom: 5px; }
        .field { position: relative; }
        .field i { position: absolute; left: 12px; top: 12px; color: var(--blue); }
        .field input { 
            width: 100%; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 12px 12px 40px; border-radius: 10px; color: white; outline: none; box-sizing: border-box;
        }

        /* 3. NOTIFICATIONS (SWITCHES) */
        .switch-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--blue); }
        input:checked + .slider:before { transform: translateX(21px); }

        .btn-update { 
            width: 100%; padding: 14px; background: var(--blue); color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        #status { margin-top: 15px; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; display: none; }
    </style>
</head>
<body>

<div class="container">
    
    <h2><i class="fas fa-user-circle"></i> Informations</h2>
    <div class="section-card">
        <div class="info-row"><span>Utilisateur:</span> <span>@kerby</span></div>
        <div class="info-row"><span>ID Compte:</span> <span>BK-2026</span></div>
        <div class="info-row"><span>Statut:</span> <span style="color: #2ecc71;">Vérifié <i class="fas fa-check-circle"></i></span></div>
    </div>

    <h2><i class="fas fa-bell"></i> Notifications</h2>
    <div class="section-card">
        <div class="switch-row">
            <span>Alertes de Dépôt</span>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>
        <div class="switch-row">
            <span>Alertes de Retrait</span>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>
    </div>

    <h2><i class="fas fa-key"></i> Mot de passe</h2>
    <div class="section-card">
        <div class="input-group">
            <label>Ancien mot de passe</label>
            <div class="field"><i class="fas fa-lock"></i><input type="password" id="old-pass" placeholder="Ancien"></div>
        </div>
        <div class="input-group">
            <label>Nouveau mot de passe</label>
            <div class="field"><i class="fas fa-shield-alt"></i><input type="password" id="new-pass" placeholder="Nouveau"></div>
        </div>
        <button class="btn-update" onclick="valider()">Sauvegarder les changements</button>
        <div id="status"></div>
    </div>
    
    <p style="text-align: center;">
        <a href="dashboard.html" style="color: var(--text); text-decoration: none; font-size: 14px;">
            <i class="fas fa-arrow-left"></i> Retour au Dashboard
        </a>
    </p>

</div>

<script>
    function valider() {
        const oldP = document.getElementById('old-pass').value;
        const newP = document.getElementById('new-pass').value;
        const status = document.getElementById('status');
        const btn = document.querySelector('.btn-update');

        if(!oldP || !newP) {
            showMsg("Remplissez les champs ⚠️", "#ff4d4d", "rgba(255, 77, 77, 0.1)");
            return;
        }

        btn.innerHTML = "Traitement...";
        btn.disabled = true;

        setTimeout(() => {
            showMsg("Modifications enregistrées ! ✅", "#2ecc71", "rgba(46, 204, 113, 0.1)");
            btn.innerHTML = "Sauvegarder les changements";
            btn.disabled = false;
            document.getElementById('old-pass').value = "";
            document.getElementById('new-pass').value = "";
            setTimeout(() => { status.style.display = "none"; }, 3000);
        }, 2000);
    }

    function showMsg(txt, color, bg) {
        const status = document.getElementById('status');
        status.innerText = txt; status.style.color = color; status.style.background = bg;
        status.style.display = "block";
    }
</script>

</body>
</html>
