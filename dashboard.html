<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }

        .header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--card-dark); display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.2); justify-content: space-between; }
        .brand { font-weight: 900; color: var(--gold); font-size: 18px; }

        .container { margin-top: 90px; padding: 15px; max-width: 500px; margin-left: auto; margin-right: auto; }
        
        /* MESAJ KYC A */
        #kyc-msg { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; text-align: center; display: block; }

        /* BALANS */
        .balance-card { background: linear-gradient(135deg, #112240 0%, #1a3060 100%); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(212, 175, 55, 0.3); }

        /* GRID KI PA BLOKE DITOU POU N TESTE */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .grid-item { background: var(--card-dark); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: var(--text); transition: 0.3s; }
        .grid-item i { font-size: 24px; color: var(--gold); margin-bottom: 10px; }

        /* KLAS BLOKAJ LA (POU N TESTE) */
        .is-locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars" style="font-size: 24px; color: var(--gold);"></i>
        <div class="brand">LIVE CRYPTO BOT</div>
        <div id="status" style="background: #555; color: white; padding: 5px 10px; border-radius: 8px;">BK</div>
    </div>

    <div class="container">
        <div id="kyc-msg">
            <i class="fas fa-info-circle"></i> Verifye KYC ou pou debloke tout opsyon yo.
        </div>

        <div class="balance-card">
            <small style="color: var(--gold); font-weight: bold;">BALANS DISPONIB</small>
            <h1 id="balansHTG">0.00 HTG</h1>
            <div id="balansUSDT" style="color: var(--gold);">0.00 USDT</div>
        </div>

        <div class="grid-menu">
            <a href="kat.html" class="grid-item" id="btn-kat">
                <i class="fas fa-credit-card"></i><br><small>Kat Virtuel</small>
            </a>
            <a href="depot.html" class="grid-item" id="btn-depot">
                <i class="fas fa-plus-circle"></i><br><small>Dépôt</small>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE",
            authDomain: "live-crypto-bot.firebaseapp.com",
            projectId: "live-crypto-bot",
            storageBucket: "live-crypto-bot.firebasestorage.app",
            messagingSenderId: "583419008753",
            appId: "1:583419008753:web:f4b8389ace26d7e5bf7b50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userID = "BK-2026"; 

        const userRef = ref(db, 'users/' + userID);
        onValue(userRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Mizajou Balans
                document.getElementById('balansHTG').innerText = (data.balanceHTG || 0).toFixed(2) + " HTG";
                document.getElementById('balansUSDT').innerText = (data.balanceUSDT || 0).toFixed(2) + " USDT";

                // Si verified se true, nou chanje koulè status la
                if (data.verified === true) {
                    document.getElementById('kyc-msg').style.display = 'none';
                    document.getElementById('status').style.background = '#28a745';
                    document.getElementById('status').innerHTML = '✔';
                } else {
                    // Si se false, nou fòse bouton yo bloke pou sekirite
                    document.getElementById('btn-kat').classList.add('is-locked');
                    document.getElementById('btn-depot').classList.add('is-locked');
                }
            }
        });
    </script>
</body>
</html>
