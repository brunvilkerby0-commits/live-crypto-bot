<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Crypto Bot - Mes Cartes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .card-container { 
            background: linear-gradient(135deg, #1a3060, #0a192f); 
            border-radius: 15px; padding: 20px; border: 1px solid var(--gold);
            position: relative; overflow: hidden; margin-bottom: 20px;
        }
        .chip { width: 40px; height: 30px; background: #ddd; border-radius: 5px; margin-bottom: 10px; }
        .card-number { font-size: 20px; letter-spacing: 2px; margin: 15px 0; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }

        #recharge-section { 
            background: var(--card-dark); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(212, 175, 55, 0.2); display: none; 
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #0a192f; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2 style="color: var(--gold); text-align: center;">MA CARTE VIRTUELLE</h2>

    <div id="pati-kat-pèsonèl" style="display: none;">
        <div class="card-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="chip"></div>
                <i class="fab fa-cc-visa" style="font-size: 30px; color: white;"></i>
            </div>
            <div class="card-number" id="card-num">**** **** **** ****</div>
            <div style="display: flex; justify-content: space-between;">
                <div><small>NOM</small><br><b id="card-holder">---</b></div>
                <div><small>EXP</small><br><b id="card-exp">--/--</b></div>
                <div><small>CVV</small><br><b id="card-cvv">***</b></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-outline" onclick="toggleInfo()"><i class="fas fa-eye"></i> Infos</button>
            <button class="btn btn-gold" onclick="showRecharge()"><i class="fas fa-bolt"></i> Recharger</button>
        </div>
    </div>

    <div id="pati-achate-kat" style="text-align: center; padding: 40px 20px;">
        <i class="fas fa-credit-card" style="font-size: 50px; color: var(--gold); opacity: 0.3;"></i>
        <p>Ou poko gen yon kat virtuel. Kreye youn kounye a!</p>
        <button class="btn btn-gold" style="width: 100%;">COMMANDER UNE CARTE ($11)</button>
    </div>

    <div id="recharge-section" style="margin-top: 20px;">
        <h3 style="color: var(--gold);">Rechaje Kat ou</h3>
        <p style="font-size: 12px; opacity: 0.7;">Frais de recharge: <b style="color: var(--gold);">$3.00</b></p>
        
        <label>Montan pou voye sou kat ($):</label>
        <div style="position: relative;">
            <input type="number" id="amount" placeholder="Min $5" oninput="calculateTotal()">
            <button onclick="setMax()" style="position: absolute; right: 5px; top: 15px; background: var(--gold); border: none; padding: 5px; border-radius: 4px; font-size: 10px; font-weight: bold;">MAX</button>
        </div>

        <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 10px;">
            <div style="display: flex; justify-content: space-between;">
                <span>Total à déduire:</span>
                <span id="total-pay" style="color: var(--gold); font-weight: bold;">$0.00</span>
            </div>
        </div>

        <button class="btn btn-gold" style="width: 100%; margin-top: 15px;" onclick="confirmRecharge()">KONFIME RECHAJ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE",
            authDomain: "live-crypto-bot.firebaseapp.com",
            projectId: "live-crypto-bot",
            storageBucket: "live-crypto-bot.firebasestorage.app",
            messagingSenderId: "583419008753",
            appId: "1:583419008753:web:f4b8389ace26d7e5bf7b50"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userID = "BK-2026"; 

        const userRef = ref(db, 'users/' + userID);
        onValue(userRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.hasCard === true) {
                // Montre kat la si l genyen
                document.getElementById('pati-achate-kat').style.display = 'none';
                document.getElementById('pati-kat-pèsonèl').style.display = 'block';
                
                // Mete info yo an kachèt pou sekirite
                window.cardData = data.cardDetails; 
                document.getElementById('card-holder').innerText = data.cardDetails.name;
            }
        });
    </script>

    <script>
        let infoVisible = false;
        function toggleInfo() {
            const num = document.getElementById('card-num');
            const cvv = document.getElementById('card-cvv');
            const exp = document.getElementById('card-exp');

            if (!infoVisible) {
                num.innerText = window.cardData.number;
                cvv.innerText = window.cardData.cvv;
                exp.innerText = window.cardData.exp;
                infoVisible = true;
            } else {
                num.innerText = "**** **** **** ****";
                cvv.innerText = "***";
                exp.innerText = "--/--";
                infoVisible = false;
            }
        }

        function showRecharge() {
            document.getElementById('recharge-section').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }

        function calculateTotal() {
            let amt = parseFloat(document.getElementById('amount').value) || 0;
            if (amt > 0) {
                let total = amt + 3; // Frais $3
                document.getElementById('total-pay').innerText = "$" + total.toFixed(2);
            }
        }

        function setMax() {
            // Isit la ou ka mete lojik pou l pran tout balans kliyan an
            document.getElementById('amount').value = 50; // Egzanp
            calculateTotal();
        }

        function confirmRecharge() {
            alert("Demann rechaj ou voye! Frais $3 la ap dedwi nan balans ou.");
        }
    </script>
</body>
</html>
