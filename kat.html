<div class="container" style="background: #0a192f; color: white; padding: 20px; font-family: sans-serif;">
    
    <div id="cardDisplay" style="border: 2px solid #d4af37; border-radius: 15px; padding: 20px; background: linear-gradient(135deg, #1a3060, #0a192f); margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between;">
            <strong>VISA</strong>
            <button onclick="toggleInfo()" style="background: none; border: none; color: #d4af37; cursor: pointer; font-size: 20px;">
                <i id="eyeIcon" class="fas fa-eye"></i>
            </button>
        </div>
        <h2 id="numCard" style="letter-spacing: 3px; margin: 20px 0;">**** **** **** ****</h2>
        <div style="display: flex; justify-content: space-between;">
            <span id="nameOnCard">VOTRE NOM</span>
            <span>CVV: <b id="cvvCard">***</b></span>
        </div>
    </div>

    <label style="color: #d4af37; font-size: 12px;">NIVEAU DE LA CARTE</label>
    <select id="priceSelect" onchange="updatePrice()" style="width: 100%; padding: 10px; margin-bottom: 20px; background: #112240; color: white; border: 1px solid #d4af37;">
        <option value="11">Visa Classic - Bleu ($11)</option>
        <option value="25">Visa Gold - Or ($25)</option>
        <option value="30">Visa Black - Noir ($30)</option>
    </select>

    <div style="text-align: center; margin-bottom: 20px;">
        <span style="font-size: 14px;">Prix total à payer:</span><br>
        <strong id="displayPrice" style="font-size: 32px; color: #d4af37;">$11.00</strong>
    </div>

    <button onclick="alert('Kòmand ou an ap trete!')" style="width: 100%; padding: 15px; background: #d4af37; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">
        COMMANDER MAINTENANT
    </button>
</div>

<script>
    // Pwen #2: Sekirite ak Bouton "Je"
    let hidden = true;
    function toggleInfo() {
        hidden = !hidden;
        document.getElementById('numCard').innerText = hidden ? "**** **** **** ****" : "4532 8810 0021 9945";
        document.getElementById('cvvCard').innerText = hidden ? "***" : "771";
        document.getElementById('eyeIcon').className = hidden ? "fas fa-eye" : "fas fa-eye-slash";
    }

    // Mizajou pri otomatik (11, 25, 30)
    function updatePrice() {
        let val = document.getElementById('priceSelect').value;
        document.getElementById('displayPrice').innerText = "$" + val + ".00";
        
        // Pwen #5: Chanje koulè selon nivo
        let card = document.getElementById('cardDisplay');
        if(val == "25") card.style.background = "linear-gradient(135deg, #d4af37, #8a6d3b)";
        else if(val == "30") card.style.background = "black";
        else card.style.background = "linear-gradient(135deg, #1a3060, #0a192f)";
    }
</script>
