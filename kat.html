<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Sèvis Kat - Live Crypto Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; --classic: linear-gradient(135deg, #112240, #1a3060); --platinum: linear-gradient(135deg, #000, #444); --gold-gr: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c); }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; -webkit-text-size-adjust: 100%; }

        /* DESIGN KAT KI PA DEFYRE LÈ W TAPE */
        .visa-card {
            width: 100%; max-width: 350px; height: 210px; perspective: 1000px; margin: 20px auto; 
        }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .flipped { transform: rotateY(180deg); }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; padding: 25px; box-sizing: border-box; }
        .card-front { background: var(--gold-gr); color: #443403; }
        .card-back { background: #111; color: white; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; }
        
        .card-num { font-size: 22px; letter-spacing: 3px; margin-top: 40px; text-align: center; font-weight: bold; }
        .card-info { display: flex; justify-content: space-between; margin-top: 30px; font-size: 10px; font-weight: 900; }

        /* UI ELEMENTS */
        .section-box { background: var(--card-dark); border-radius: 20px; padding: 20px; border: 1px solid rgba(212, 175, 55, 0.2); margin-top: 20px; }
        .label-text { display: block; font-size: 11px; color: var(--gold); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; margin-top: 10px; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #222; background: #050d1a; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 100%; padding: 16px; background: var(--gold); color: black; border: none; border-radius: 12px; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; margin-top: 15px; }
        .btn-service { background: transparent; border: 2px solid var(--gold); color: var(--gold); margin-bottom: 10px; }

        .price-display { text-align: center; margin: 15px 0; border: 2px dashed var(--gold); border-radius: 10px; padding: 10px; }
        .price-val { font-size: 28px; font-weight: 900; color: var(--gold); }
    </style>
</head>
<body>

    <h3 style="text-align: center; color: var(--gold); letter-spacing: 2px;">MA CARTE VIRTUELLE</h3>

    <div class="visa-card" id="card-ui" onclick="toggleFlip()">
        <div class="card-inner" id="card-inner">
            <div class="card-front" id="card-bg">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="width: 45px; height: 32px; background: rgba(0,0,0,0.1); border-radius: 5px;"></div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" width="55" id="visa-logo">
                </div>
                <div class="card-num" id="card-number-display">**** **** **** ****</div>
                <div class="card-info">
                    <div>TITULAIRE<br><span id="card-name-display" style="font-size: 13px;">VOTRE NOM</span></div>
                    <div>EXP<br><span>12/28</span></div>
                </div>
            </div>
            <div class="card-back">
                <div style="background: #000; height: 40px; width: 115%; margin-left: -25px; margin-top: -50px;"></div>
                <div style="background: white; color: black; padding: 5px 10px; width: fit-content; align-self: flex-end; margin-top: 30px; border-radius: 4px; font-weight: bold;">
                    CVV: <span id="card-cvv-display">***</span>
                </div>
            </div>
        </div>
    </div>
    <p style="text-align: center; font-size: 11px; opacity: 0.6; margin-top: -10px;"><i class="fas fa-sync"></i> Cliquez pour voir le dos</p>

    <div id="service-section" style="display: none;" class="section-box">
        <button class="btn-main btn-service" onclick="toggleFlip()"><i class="fas fa-eye"></i> VOIR INFOS CARTE</button>
        <button class="btn-main" onclick="openRecharge()"><i class="fas fa-bolt"></i> RECHARGER ($3 FRAIS)</button>
        
        <div id="recharge-form" style="display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
            <span class="label-text">Montant à recharger ($)</span>
            <input type="number" id="r-amt" placeholder="Min $5.00" oninput="calcR()">
            <div style="font-size: 12px; margin-top: 10px; color: #2ecc71;">Total avec frais: <span id="r-total">$0.00</span></div>
            <button class="btn-main" style="background: #2ecc71;" onclick="submitRecharge()">CONFIRMER RECHARGE</button>
        </div>
    </div>

    <div id="order-section" class="section-box">
        <div class="price-display">
            <span class="price-val" id="price-tag">$25.00</span><br>
            <small style="color: #2ecc71;">Inclut $5.00 de solde initial</small>
        </div>

        <span class="label-text">Nom Complet (KYC)</span>
        <input type="text" id="in-name" placeholder="Jan sa sou ID ou" oninput="updateCardUI()">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <span class="label-text">Date de Naissance</span>
                <input type="date" id="in-dob">
            </div>
            <div style="flex: 1;">
                <span class="label-text">Niveau</span>
                <select id="in-level" onchange="updateLevelUI()">
                    <option value="25">Gold ($25)</option>
                    <option value="30">Platinum ($30)</option>
                    <option value="11">Classic ($11)</option>
                </select>
            </div>
        </div>

        <span class="label-text">Adresse de Résidence</span>
        <input type="text" id="in-adr" placeholder="Rue, Ville, Pays">

        <button class="btn-main" onclick="submitOrder()">COMMANDER MAINTENANT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCkfT1FJmi0CM8jjs7xFhnjMrgW3yWXkpE", databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com", projectId: "live-crypto-bot" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const userID = "BK-2026"; 

        // 1. TCHEKE STATUS KLIYAN
        onValue(ref(db, 'users/' + userID), (snap) => {
            const data = snap.val();
            if (data && data.hasCard) {
                document.getElementById('order-section').style.display = 'none';
                document.getElementById('service-section').style.display = 'block';
                document.getElementById('card-name-display').innerText = data.cardDetails.name;
                window.userCard = data.cardDetails;
                applyCardStyle(data.cardDetails.level);
            }
        });

        // 2. SOUMÈT KÒMAND
        window.submitOrder = function() {
            const name = document.getElementById('in-name').value;
            if(!name || !document.getElementById('in-dob').value) return alert("Ranpli tout fòm nan!");

            push(ref(db, 'card_orders'), {
                userId: userID,
                name: name,
                dob: document.getElementById('in-dob').value,
                address: document.getElementById('in-adr').value,
                level: document.getElementById('in-level').value,
                status: "Pending",
                date: new Date().toLocaleString()
            }).then(() => alert("Kòmand ou an voye pou verifikasyon!"));
        }
    </script>

    <script>
        function toggleFlip() { document.getElementById('card-inner').classList.toggle('flipped'); }

        function updateCardUI() {
            const n = document.getElementById('in-name').value;
            // Si non an efase, li tounen "VOTRE NOM" otomatikman (Fixed)
            document.getElementById('card-name-display').innerText = n ? n.toUpperCase() : "VOTRE NOM";
        }

        function updateLevelUI() {
            const lvl = document.getElementById('in-level').value;
            document.getElementById('price-tag').innerText = "$" + lvl + ".00";
            applyCardStyle(lvl);
        }

        function applyCardStyle(lvl) {
            const bg = document.getElementById('card-bg');
            const logo = document.getElementById('visa-logo');
            if(lvl == "11") { bg.style.background = "var(--classic)"; bg.style.color = "white"; logo.style.filter="brightness(2)"; }
            else if(lvl == "30") { bg.style.background = "var(--platinum)"; bg.style.color = "white"; logo.style.filter="brightness(2)"; }
            else { bg.style.background = "var(--gold-gr)"; bg.style.color = "#443403"; logo.style.filter="none"; }
        }

        function openRecharge() { document.getElementById('recharge-form').style.display = 'block'; }
        function calcR() {
            const a = parseFloat(document.getElementById('r-amt').value) || 0;
            document.getElementById('r-total').innerText = "$" + (a > 0 ? a + 3 : 0).toFixed(2);
        }
    </script>
</body>
</html>
