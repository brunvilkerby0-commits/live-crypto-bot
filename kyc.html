<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Verifikasyon KYC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .kyc-container { max-width: 500px; margin: 40px auto; background: var(--card-dark); padding: 30px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .form-group { margin-bottom: 20px; }
        .input-kyc, .select-kyc { width: 100%; padding: 12px; background: var(--navy); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-kyc { width: 100%; padding: 14px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="kyc-container">
        <h2>Vérification KYC</h2>
        <form id="kycForm">
            <div class="form-group"><label>ID Itilizatè</label><input type="text" id="kyc-userid" class="input-kyc" placeholder="Antre ID ou"></div>
            <div class="form-group"><label>Non ak Siyati</label><input type="text" id="kyc-fullname" class="input-kyc" placeholder="Non konplè"></div>
            <div class="form-group">
                <label>Kalite Dokiman</label>
                <select id="kyc-doctype" class="select-kyc">
                    <option>Carte d'Identité Nationale (CIN)</option>
                    <option>Passeport</option>
                </select>
            </div>
            <button type="button" class="btn-kyc" id="btnSubmitKyc">Soumèt pou Verifikasyon</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Enfòmasyon Telegram ou
        const TELEGRAM_BOT_TOKEN = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc"; 
        const TELEGRAM_CHAT_ID = "-1003948852501";

        document.getElementById('btnSubmitKyc').addEventListener('click', function() {
            const uid = document.getElementById('kyc-userid').value.trim();
            const fullname = document.getElementById('kyc-fullname').value.trim();
            const doctype = document.getElementById('kyc-doctype').value;

            if (!uid || !fullname) {
                alert("Tanpri ranpli ID ak Non an!");
                return;
            }

            // 1. Voye nan Firebase
            update(ref(db, 'users/' + uid), { 
                first_name: fullname, 
                kycStatus: "en_attente",
                doc_type: doctype,
                timestamp: Date.now()
            })
            .then(() => {
                // 2. Voye mesaj Telegram
                const telegramMessage = `🚨 *NEW KYC* 🚨\n👤 ID: ${uid}\n📛 Non: ${fullname}\n📄 Dokiman: ${doctype}`;
                
                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        chat_id: TELEGRAM_CHAT_ID, 
                        text: telegramMessage, 
                        parse_mode: "Markdown" 
                    })
                });

                alert("Done yo voye avèk siksè!");
                location.reload();
            })
            .catch((error) => {
                alert("Erè Firebase: " + error.message);
            });
        });
    </script>
</body>
</html>
