<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Crypto Bot - Verifikasyon KYC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --light-gold: #f1d279; --navy: #0a192f; --card-dark: #112240; --text: #ccd6f6; --green: #2ecc71; --red: #e74c3c; }
        body { background: var(--navy); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .kyc-container { max-width: 500px; margin: 40px auto; background: var(--card-dark); padding: 30px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 10px 25px rgba(0,0,0,0.3); position: relative; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; color: var(--gold); text-decoration: none; font-size: 14px; font-weight: bold; margin-bottom: 20px; transition: color 0.3s; cursor: pointer; border: none; background: none; padding: 0; font-family: inherit; }
        .kyc-header { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .input-kyc, .select-kyc { width: 100%; padding: 12px; background: var(--navy); border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 8px; color: white; box-sizing: border-box; outline: none; font-size: 16px; }
        .file-label { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(212, 175, 55, 0.1); border: 2px dashed var(--gold); border-radius: 8px; color: white; cursor: pointer; font-size: 14px; }
        .file-input { display: none; }
        .btn-kyc { width: 100%; padding: 14px; background: var(--gold); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .custom-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 10px; font-weight: bold; color: white; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: top 0.4s ease; z-index: 9999; }
        .custom-alert.show { top: 20px; }
    </style>
</head>
<body>
    <div id="customAlert" class="custom-alert">
        <i id="alertIcon" class="fas"></i>
        <span id="alertMessage"></span>
    </div>

    <div class="kyc-container">
        <button onclick="history.back();" class="btn-back"><i class="fas fa-arrow-left"></i> Retournen nan Dashboard</button>
        <div class="kyc-header">
            <h2>Vérification KYC</h2>
        </div>
        <form id="kycForm">
            <div class="form-group"><label>ID Itilizatè</label><input type="text" id="kyc-userid" class="input-kyc"></div>
            <div class="form-group"><label>Non ak Siyati</label><input type="text" id="kyc-fullname" class="input-kyc"></div>
            <div class="form-group"><label>Kalite Dokiman</label><select id="kyc-doctype" class="select-kyc"><option>Carte d'Identité Nationale (CIN)</option><option>Passeport</option></select></div>
            <div class="form-group"><label class="file-label" for="kyc-front"><i class="fas fa-upload"></i> Chwazi Foto Devan</label><input type="file" id="kyc-front" class="file-input"></div>
            <div class="form-group"><label class="file-label" for="kyc-back"><i class="fas fa-upload"></i> Chwazi Foto Dèyè</label><input type="file" id="kyc-back" class="file-input"></div>
            <div class="form-group"><label class="file-label" for="kyc-selfie"><i class="fas fa-upload"></i> Chwazi Foto Selfie</label><input type="file" id="kyc-selfie" class="file-input"></div>
            <button type="button" class="btn-kyc" id="btnSubmitKyc">Soumèt pou Verifikasyon</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const db = getDatabase(initializeApp({
            databaseURL: "https://live-crypto-bot-default-rtdb.firebaseio.com"
        }));

        const TELEGRAM_BOT_TOKEN = "8650927753:AAENrCiVGi4m89bDj7fVz15Ax7nDUVnEYlc"; 
        const TELEGRAM_CHAT_ID = "-1003948852501";
        let uploadedImages = { front: "", back: "", selfie: "" };

        // [Fonksyon handleFileSelect ak lòt yo rete menm jan an...]

        document.getElementById('btnSubmitKyc').addEventListener('click', function() {
            const uid = document.getElementById('kyc-userid').value.trim();
            const fullname = document.getElementById('kyc-fullname').value.trim();
            
            // ... (logik pou verifye si jaden yo ranpli)

            update(ref(db, 'users/' + uid), { kycFullName: fullname, kycStatus: "en_attente" }).then(() => {
                const telegramMessage = `🚨 *NEW KYC* 🚨\n👤 ID: ${uid}\n📛 Non: ${fullname}`;
                
                // --- LYEN SA A SE SA KII PRAL RJE 404 LA ---
                const inlineKeyboard = {
                    inline_keyboard: [[{ 
                        text: "✅ Ouvri paj Admin pou Valide", 
                        url: "https://brunvilkerby0-commits.github.io/live-crypto-bot/admin.html" 
                    }]]
                };

                fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: telegramMessage, parse_mode: "Markdown", reply_markup: inlineKeyboard })
                }).then(() => {
                    alert("KYC Soumèt!");
                    location.reload();
                });
            });
        });
    </script>
</body>
</html>
